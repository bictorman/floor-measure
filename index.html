      selectedShapeId = null;
      drawingLine = null;
      drawOpeningType = null;
      updatePlacingCursor();
      save();
      render();
      return;
    }

    const line = {
      id: nextLineId++,
      x1: drawingLine.x1, y1: drawingLine.y1,
      x2: pt.x, y2: pt.y,
    };
    commit();
    state.lines.push(line);
    drawingLine = null;

    if (!state.pixelsPerMeter) {
      showModal({
        title: 'Set scale',
        message: 'Real-world length of this line, in meters. This will calibrate every other measurement.',
        defaultValue: '',
        onOk: value => {
          if (value > 0) setCalibration(line, value);
          save();
          render();
        },
        onCancel: () => {
          save();
          render();
        },
      });
    } else {
      save();
      render();
    }
  }

  // ---------- zoom ----------
  container.addEventListener('wheel', e => {
    if (!state.imageDataUrl) return;
    e.preventDefault();
    const rect = container.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const factor = Math.exp(-e.deltaY * 0.0015);
    zoomBy(factor, cx, cy);
  }, { passive: false });

  function zoomBy(factor, cx, cy) {
    const newZoom = Math.max(0.05, Math.min(40, state.zoom * factor));
    const f = newZoom / state.zoom;
    state.panX = cx - (cx - state.panX) * f;
    state.panY = cy - (cy - state.panY) * f;
    state.zoom = newZoom;
    applyTransform();
    render();
    save();
  }

  function zoomToCenter(factor) {
    const rect = container.getBoundingClientRect();
    zoomBy(factor, rect.width / 2, rect.height / 2);
  }

  function fitToView() {
    if (!state.imageW) return;
    const rect = container.getBoundingClientRect();
    const margin = 20;
    const [bw, bh] = rotatedBBox();
    const sx = (rect.width - margin * 2) / bw;
    const sy = (rect.height - margin * 2) / bh;
    state.zoom = Math.max(0.05, Math.min(sx, sy));
    state.panX = (rect.width - bw * state.zoom) / 2;
    state.panY = (rect.height - bh * state.zoom) / 2;
    applyTransform();
    render();
    save();
  }

  function actualSize() {
    if (!state.imageW) return;
    const rect = container.getBoundingClientRect();
    const [bw, bh] = rotatedBBox();
    state.zoom = 1;
    state.panX = (rect.width - bw) / 2;
    state.panY = (rect.height - bh) / 2;
    applyTransform();
    render();
    save();
  }

  // ---------- rotation ----------
  function rotate90() {
    if (!state.imageW) return;
    const rect = container.getBoundingClientRect();
    // Image-pixel point currently under the screen center.
    const centerImg = screenToWorld(rect.left + rect.width / 2, rect.top + rect.height / 2);
    state.rotation = (normRotation() + 90) % 360;
    // Put that same image point back at the screen center after rotation.
    const w = imageToWorld(centerImg.x, centerImg.y);
    state.panX = rect.width / 2 - state.zoom * w.x;
    state.panY = rect.height / 2 - state.zoom * w.y;
    applyTransform();
    render();
    save();
  }

  // ---------- export ----------
  function exportPNG() {
    if (!state.imageDataUrl || !state.imageW) {
      alert('Upload an image first.');
      return;
    }
    // Lines live in unstretched image-pixel space; the stretched image may extend
    // past that area. The canvas covers the union so neither gets clipped.
    const sx = state.imageScaleX == null ? 1 : Math.max(0.01, state.imageScaleX);
    const sy = state.imageScaleY == null ? 1 : Math.max(0.01, state.imageScaleY);
    const drawW = state.imageW * sx;
    const drawH = state.imageH * sy;
    const boundW = Math.max(state.imageW, drawW);
    const boundH = Math.max(state.imageH, drawH);
    const r = normRotation();
    const bw = (r === 90 || r === 270) ? boundH : boundW;
    const bh = (r === 90 || r === 270) ? boundW : boundH;
    const tx = (r === 90) ? boundH : (r === 180) ? boundW : 0;
    const ty = (r === 180) ? boundH : (r === 270) ? boundW : 0;

    const canvas = document.createElement('canvas');
    canvas.width = bw;
    canvas.height = bh;
    const ctx = canvas.getContext('2d');

    // Match the app's canvas background so reduced-opacity exports composite the
    // same way they appear on screen.
    ctx.fillStyle = '#0d0d0d';
    ctx.fillRect(0, 0, bw, bh);

    const θrad = r * Math.PI / 180;

    // Draw the rotated (and possibly stretched) image, honoring the on-screen
    // opacity setting.
    ctx.save();
    ctx.globalAlpha = state.imageOpacity == null ? 1 : Math.max(0, Math.min(1, state.imageOpacity));
    ctx.translate(tx, ty);
    ctx.rotate(θrad);
    ctx.drawImage(img, 0, 0, drawW, drawH);
    ctx.restore();

    // Sizing scaled to image so it looks right on any resolution.
    const diag = Math.hypot(state.imageW, state.imageH);
    const base = Math.max(2, diag / 800);
    const strokeW = base;
    const handleR = base * 1.6;
    const fontSize = Math.max(14, base * 7);
    const labelOffset = fontSize * 0.7;

    // Shapes go under the lines, matching the on-screen layer order.
    if (state.pixelsPerMeter) {
      for (const shape of state.shapes) {
        drawShapeCanvas(ctx, shape, strokeW, tx, ty, θrad);
      }
    }

    for (const line of state.lines) {
      const isCal = line.id === state.calibrationLineId;
      const color = isCal ? '#5fbf6f' : '#4a9fff';
      drawLineCanvas(ctx, line, color, strokeW, handleR, fontSize, labelOffset, tx, ty, θrad);
    }

    // Openings on top of the lines, mirroring the screen: repaint the image through the
    // gap (covering the wall) then draw the jambs.
    const jambHalf = base * 6;
    for (const op of state.openings) {
      drawOpeningCanvas(ctx, op, openingColor(op), jambHalf, drawW, drawH, tx, ty, θrad);
    }

    const areaFontSize = Math.max(16, base * 8);
    for (const a of findLoopAreas()) {
      drawAreaLabelCanvas(ctx, a, areaFontSize, tx, ty, θrad);
    }

    canvas.toBlob(blob => {
      if (!blob) { alert('Export failed.'); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'floorplan-measurements.png';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  }

  function drawAreaLabelCanvas(ctx, label, fontSize, tx, ty, θrad) {
    const c = Math.cos(θrad), s = Math.sin(θrad);
    const cx = tx + (label.cx * c - label.cy * s);
    const cy = ty + (label.cx * s + label.cy * c);
    const text = formatArea(label.areaM2);
    ctx.font = `600 ${fontSize}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = fontSize * 0.3;
    ctx.lineJoin = 'round';
    ctx.miterLimit = 2;
    ctx.strokeStyle = '#000';
    ctx.strokeText(text, cx, cy);
    ctx.fillStyle = '#ffd54a';
    ctx.fillText(text, cx, cy);
  }

  function drawShapeCanvas(ctx, shape, strokeW, tx, ty, θrad) {
    const ppm = state.pixelsPerMeter;
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(θrad);
    ctx.fillStyle = 'rgba(120, 120, 120, 0.6)';
    ctx.strokeStyle = '#555';
    ctx.lineWidth = strokeW;
    if (shape.type === 'circle') {
      ctx.beginPath();
      ctx.arc(shape.cx, shape.cy, shape.radiusM * ppm, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    } else if (shape.type === 'rect') {
      const wPx = shape.widthM * ppm;
      const hPx = shape.lengthM * ppm;
      ctx.save();
      ctx.translate(shape.cx, shape.cy);
      ctx.rotate((shape.angle || 0) * Math.PI / 180);
      ctx.beginPath();
      ctx.rect(-wPx / 2, -hPx / 2, wPx, hPx);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  function drawOpeningCanvas(ctx, op, color, jambHalf, drawW, drawH, tx, ty, θrad) {
    const g = openingGeom(op);
    const hw = g.L / 2;
    // Band corners in image-pixel coords (along ± perpendicular about the midpoint).
    const corners = [[1, 1], [1, -1], [-1, -1], [-1, 1]].map(([a, b]) => [
      g.mx + g.ux * hw * a + g.nx * jambHalf * b,
      g.my + g.uy * hw * a + g.ny * jambHalf * b,
    ]);

    // Repaint the image clipped to the band so the gap shows the floor plan, not the wall.
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(θrad);
    ctx.beginPath();
    ctx.moveTo(corners[0][0], corners[0][1]);
    for (let i = 1; i < corners.length; i++) ctx.lineTo(corners[i][0], corners[i][1]);
    ctx.closePath();
    ctx.clip();
    ctx.globalAlpha = state.imageOpacity == null ? 1 : Math.max(0, Math.min(1, state.imageOpacity));
    ctx.drawImage(img, 0, 0, drawW, drawH);
    ctx.restore();

    // Dotted line spanning the gap, then jamb ticks + endpoint handles on top.
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(θrad);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = jambHalf * 0.22;
    ctx.lineCap = 'round';
    const dash = jambHalf * 0.5;
    ctx.setLineDash([dash, dash * 1.5]);
    ctx.beginPath();
    ctx.moveTo(op.x1, op.y1);
    ctx.lineTo(op.x2, op.y2);
    ctx.stroke();
    ctx.setLineDash([]);
    for (const [x, y] of [[op.x1, op.y1], [op.x2, op.y2]]) {
      ctx.beginPath();
      ctx.moveTo(x - g.nx * jambHalf, y - g.ny * jambHalf);
      ctx.lineTo(x + g.nx * jambHalf, y + g.ny * jambHalf);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x, y, jambHalf * 0.28, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawLineCanvas(ctx, line, color, strokeW, handleR, fontSize, labelOffset, tx, ty, θrad) {
    // Line and handles rotate with the image.
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(θrad);
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = strokeW;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(line.x1, line.y1);
    ctx.lineTo(line.x2, line.y2);
    ctx.stroke();
    for (const [x, y] of [[line.x1, line.y1], [line.x2, line.y2]]) {
      ctx.beginPath();
      ctx.arc(x, y, handleR, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    const lengthM = computeLengthMeters(line);
    if (lengthM == null) return;
    const text = formatLength(lengthM);

    // Label position in image-pixel coords (next to the line midpoint).
    const mx = (line.x1 + line.x2) / 2;
    const my = (line.y1 + line.y2) / 2;
    const dx = line.x2 - line.x1;
    const dy = line.y2 - line.y1;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const nx = -dy / len;
    const ny = dx / len;
    const lx = mx + nx * labelOffset;
    const ly = my + ny * labelOffset;

    // Project to canvas coords through the rotation so the label sits in the right spot,
    // but draw the text horizontally (no rotation) so it stays readable.
    const c = Math.cos(θrad), s = Math.sin(θrad);
    const cx = tx + (lx * c - ly * s);
    const cy = ty + (lx * s + ly * c);

    ctx.font = `600 ${fontSize}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = fontSize * 0.25;
    ctx.strokeStyle = '#000';
    ctx.lineJoin = 'round';
    ctx.miterLimit = 2;
    ctx.strokeText(text, cx, cy);
    ctx.fillStyle = color;
    ctx.fillText(text, cx, cy);
  }

  // ---------- buttons ----------
  document.getElementById('zoom-in-btn').addEventListener('click', () => zoomToCenter(1.25));
  document.getElementById('zoom-out-btn').addEventListener('click', () => zoomToCenter(1 / 1.25));
  document.getElementById('zoom-fit-btn').addEventListener('click', fitToView);
  document.getElementById('zoom-100-btn').addEventListener('click', actualSize);
  document.getElementById('rotate-btn').addEventListener('click', rotate90);
  document.getElementById('export-btn').addEventListener('click', exportPNG);
  undoBtn.addEventListener('click', undo);
  redoBtn.addEventListener('click', redo);
  document.getElementById('save-project-btn').addEventListener('click', saveProject);
  projectInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) loadProject(file);
    projectInput.value = '';
  });

  const dropdowns = [
    { btn: document.getElementById('project-menu-btn'), menu: document.getElementById('project-menu'), closeOnInnerClick: true },
    { btn: document.getElementById('image-menu-btn'), menu: document.getElementById('image-menu'), closeOnInnerClick: false },
    { btn: shapeMenuBtn, menu: shapeMenu, closeOnInnerClick: true },
  ];
  document.getElementById('add-circle-btn').addEventListener('click', addCircleAction);
  document.getElementById('add-rect-btn').addEventListener('click', addRectAction);
  document.getElementById('add-door-btn').addEventListener('click', () => startDrawOpening('door'));
  document.getElementById('add-window-btn').addEventListener('click', () => startDrawOpening('window'));
  function setDropdownOpen(target, open) {
    for (const d of dropdowns) {
      const active = d === target && open;
      d.menu.hidden = !active;
      d.btn.classList.toggle('active', active);
    }
  }
  for (const d of dropdowns) {
    d.btn.addEventListener('click', e => {
      e.stopPropagation();
      setDropdownOpen(d, d.menu.hidden);
    });
    if (d.closeOnInnerClick) {
      d.menu.addEventListener('click', () => setDropdownOpen(d, false));
    }
  }
  document.addEventListener('click', e => {
    for (const d of dropdowns) {
      if (d.menu.hidden) continue;
      if (!d.btn.contains(e.target) && !d.menu.contains(e.target)) {
        setDropdownOpen(d, false);
      }
    }
  });

  opacityInput.addEventListener('input', () => {
    state.imageOpacity = Math.max(0, Math.min(1, parseInt(opacityInput.value, 10) / 100));
    img.style.opacity = String(state.imageOpacity);
    save();
  });

  // Changing stretch shifts the world offset (when rotation ≠ 0). Compensate
  // pan so the image-pixel point under the screen center stays put visually.
  function withStretchCenterStable(mutate) {
    const rect = container.getBoundingClientRect();
    const centerImg = state.imageW
      ? screenToWorld(rect.left + rect.width / 2, rect.top + rect.height / 2)
      : null;
    mutate();
    applyImageScale();
    if (centerImg) {
      const w = imageToWorld(centerImg.x, centerImg.y);
      state.panX = rect.width / 2 - state.zoom * w.x;
      state.panY = rect.height / 2 - state.zoom * w.y;
      applyTransform();
    }
    save();
  }

  stretchXInput.addEventListener('input', () => {
    withStretchCenterStable(() => {
      state.imageScaleX = Math.max(0.01, parseInt(stretchXInput.value, 10) / 100);
    });
  });
  stretchYInput.addEventListener('input', () => {
    withStretchCenterStable(() => {
      state.imageScaleY = Math.max(0.01, parseInt(stretchYInput.value, 10) / 100);
    });
  });
  document.getElementById('reset-stretch-btn').addEventListener('click', () => {
    withStretchCenterStable(() => {
      state.imageScaleX = 1;
      state.imageScaleY = 1;
    });
  });

  panBtn.addEventListener('click', () => {
    panModeToggle = !panModeToggle;
    panBtn.classList.toggle('active', panModeToggle);
    container.classList.toggle('pan-mode', panModeToggle);
  });

  document.getElementById('calibrate-btn').addEventListener('click', () => {
    if (!state.calibrationLineId) {
      const line = state.lines[0];
      if (!line) {
        alert('Draw a line on the image first. You will be prompted for its length.');
        return;
      }
      showModal({
        title: 'Set scale',
        message: 'Real-world length of the first line, in meters.',
        defaultValue: '',
        onOk: value => {
          if (value > 0) {
            commit();
            setCalibration(line, value);
            save();
            render();
          }
        },
      });
      return;
    }
    const line = state.lines.find(l => l.id === state.calibrationLineId);
    editCalibration(line);
  });

  document.getElementById('clear-lines-btn').addEventListener('click', () => {
    if (!state.lines.length && !state.shapes.length && !state.openings.length) return;
    if (!confirm('Remove all measurements, shapes, doors and windows (including the scale reference)?')) return;
    commit();
    state.lines = [];
    state.shapes = [];
    state.openings = [];
    state.calibrationLineId = null;
    state.pixelsPerMeter = null;
    drawingLine = null;
    selectedLineId = null;
    selectedShapeId = null;
    selectedOpeningId = null;
    pendingShape = null;
    drawOpeningType = null;
    updatePlacingCursor();
    save();
    render();
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    if (!confirm('Remove the image and all measurements?')) return;
    state = defaultState();
    nextLineId = 1;
    nextShapeId = 1;
    nextOpeningId = 1;
    drawingLine = null;
    selectedLineId = null;
    selectedShapeId = null;
    selectedOpeningId = null;
    pendingShape = null;
    drawOpeningType = null;
    updatePlacingCursor();
    clearHistory();
    img.src = '';
    img.style.display = 'none';
    dropHint.style.display = '';
    localStorage.removeItem(STORAGE_KEY);
    applyImageOpacity();
    applyImageScale();
    applyTransform();
    render();
  });

  // ---------- keyboard ----------
  const ARROW_DIRS = {
    ArrowUp: [0, -1], ArrowDown: [0, 1],
    ArrowLeft: [-1, 0], ArrowRight: [1, 0],
  };

  function copySelectedLine() {
    const line = state.lines.find(l => l.id === selectedLineId);
    if (!line) return;
    clipboardLine = { x1: line.x1, y1: line.y1, x2: line.x2, y2: line.y2 };
    clipboardShape = null;
    clipboardOpening = null;
  }

  // Paste a copied line at the exact same image-pixel coordinates. The new line
  // is never the calibration line (only one line holds the scale), and is
  // selected so the user can immediately drag/nudge it to separate the stack.
  function pasteLine() {
    if (!clipboardLine || !state.imageDataUrl) return;
    commit();
    const line = {
      id: nextLineId++,
      x1: clipboardLine.x1, y1: clipboardLine.y1,
      x2: clipboardLine.x2, y2: clipboardLine.y2,
    };
    state.lines.push(line);
    selectedLineId = line.id;
    selectedShapeId = null;
    save();
    render();
  }

  function copySelectedShape() {
    const shape = state.shapes.find(s => s.id === selectedShapeId);
    if (!shape) return;
    // Clone every prop except the id; that includes name, angle, dims.
    const { id, ...rest } = shape;
    clipboardShape = { ...rest };
    clipboardLine = null;
    clipboardOpening = null;
  }

  function copySelectedOpening() {
    const op = state.openings.find(o => o.id === selectedOpeningId);
    if (!op) return;
    clipboardOpening = { type: op.type, x1: op.x1, y1: op.y1, x2: op.x2, y2: op.y2 };
    clipboardLine = null;
    clipboardShape = null;
  }

  // Offset the duplicate (like pasteShape) so it doesn't hide exactly under the original.
  function pasteOpening() {
    if (!clipboardOpening || !state.imageDataUrl) return;
    commit();
    const op = {
      id: nextOpeningId++,
      type: clipboardOpening.type,
      x1: clipboardOpening.x1 + SHAPE_PASTE_OFFSET, y1: clipboardOpening.y1 + SHAPE_PASTE_OFFSET,
      x2: clipboardOpening.x2 + SHAPE_PASTE_OFFSET, y2: clipboardOpening.y2 + SHAPE_PASTE_OFFSET,
    };
    state.openings.push(op);
    selectedOpeningId = op.id;
    selectedLineId = null;
    selectedShapeId = null;
    save();
    render();
  }

  function nudgeOpening(sdx, sdy) {
    const op = state.openings.find(o => o.id === selectedOpeningId);
    if (!op) return;
    commit('nudge-opening:' + op.id);
    const θ = -normRotation() * Math.PI / 180;
    const c = Math.cos(θ), s = Math.sin(θ);
    const dx = sdx * c - sdy * s;
    const dy = sdx * s + sdy * c;
    op.x1 += dx; op.y1 += dy;
    op.x2 += dx; op.y2 += dy;
    save();
    render();
  }

  // Offset the duplicate so the user can see it instead of an invisible stack.
  // 20 image-pixels feels small at typical zoom levels while still being clearly
  // separated from the original outline.
  const SHAPE_PASTE_OFFSET = 20;

  function pasteShape() {
    // Require a scale, matching the Add shape guard — otherwise render() and
    // hitTestShape() skip the shape and it becomes an invisible orphan.
    if (!clipboardShape || !state.imageDataUrl || !state.pixelsPerMeter) return;
    commit();
    const shape = { ...clipboardShape, id: nextShapeId++ };
    shape.cx = (shape.cx || 0) + SHAPE_PASTE_OFFSET;
    shape.cy = (shape.cy || 0) + SHAPE_PASTE_OFFSET;
    state.shapes.push(shape);
    selectedShapeId = shape.id;
    selectedLineId = null;
    save();
    render();
  }

  function nudgeSelected(sdx, sdy) {
    const line = state.lines.find(l => l.id === selectedLineId);
    if (!line) return;
    commit('nudge:' + line.id);
    // Screen-space delta → image-space delta (undo the rotation).
    const θ = -normRotation() * Math.PI / 180;
    const c = Math.cos(θ), s = Math.sin(θ);
    const dx = sdx * c - sdy * s;
    const dy = sdx * s + sdy * c;
    line.x1 += dx; line.y1 += dy;
    line.x2 += dx; line.y2 += dy;
    save();
    render();
  }

  function nudgeShape(sdx, sdy) {
    const shape = state.shapes.find(s => s.id === selectedShapeId);
    if (!shape) return;
    commit('nudge-shape:' + shape.id);
    const θ = -normRotation() * Math.PI / 180;
    const c = Math.cos(θ), s = Math.sin(θ);
    shape.cx += sdx * c - sdy * s;
    shape.cy += sdx * s + sdy * c;
    save();
    render();
  }

  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const mod = e.ctrlKey || e.metaKey;
    if (mod && (e.key === 'z' || e.key === 'Z')) {
      e.preventDefault();
      if (e.shiftKey) redo(); else undo();
      return;
    }
    if (mod && (e.key === 'y' || e.key === 'Y')) {
      e.preventDefault();
      redo();
      return;
    }
    if (mod && (e.key === 'c' || e.key === 'C')) {
      if (selectedLineId != null) {
        e.preventDefault();
        copySelectedLine();
      } else if (selectedShapeId != null) {
        e.preventDefault();
        copySelectedShape();
      } else if (selectedOpeningId != null) {
        e.preventDefault();
        copySelectedOpening();
      }
      return;
    }
    if (mod && (e.key === 'v' || e.key === 'V')) {
      if (clipboardOpening) {
        e.preventDefault();
        pasteOpening();
      } else if (clipboardShape) {
        e.preventDefault();
        pasteShape();
      } else if (clipboardLine) {
        e.preventDefault();
        pasteLine();
      }
      return;
    }
    if (ARROW_DIRS[e.key] && (selectedLineId != null || selectedShapeId != null || selectedOpeningId != null)) {
      e.preventDefault();
      const [dx, dy] = ARROW_DIRS[e.key];
      const step = e.shiftKey ? 10 : 1;
      if (selectedLineId != null) nudgeSelected(dx * step, dy * step);
      else if (selectedShapeId != null) nudgeShape(dx * step, dy * step);
      else nudgeOpening(dx * step, dy * step);
      return;
    }
    if (e.key === 'Escape') {
      if (pendingShape) cancelPendingShape();
      else if (drawOpeningType) cancelDrawOpening();
      else if (drawingLine) { drawingLine = null; render(); }
      else if (selectedLineId != null) { selectedLineId = null; render(); }
      else if (selectedShapeId != null) { selectedShapeId = null; render(); }
      else if (selectedOpeningId != null) { selectedOpeningId = null; render(); }
    } else if (e.key === 'Delete' || e.key === 'Backspace') {
      if (selectedLineId != null) {
        e.preventDefault();
        removeLine(selectedLineId);
      } else if (selectedShapeId != null) {
        e.preventDefault();
        removeShape(selectedShapeId);
      } else if (selectedOpeningId != null) {
        e.preventDefault();
        removeOpening(selectedOpeningId);
      }
    } else if (e.key === 'f' || e.key === 'F') {
      fitToView();
    } else if (e.key === 'r' || e.key === 'R') {
      rotate90();
    } else if (e.key === 'e' || e.key === 'E') {
      exportPNG();
    } else if (e.key === '+' || e.key === '=') {
      zoomToCenter(1.25);
    } else if (e.key === '-' || e.key === '_') {
      zoomToCenter(1 / 1.25);
    }
  });

  // ---------- status ----------
  function updateStatus() {
    const parts = [];
    if (state.imageW) parts.push(`${state.imageW}×${state.imageH}px`);
    if (state.pixelsPerMeter) parts.push(`${state.pixelsPerMeter.toFixed(1)} px/m`);
    parts.push(`zoom ${(state.zoom * 100).toFixed(0)}%`);
    if (normRotation()) parts.push(`rot ${normRotation()}°`);
    parts.push(`${state.lines.length} line${state.lines.length === 1 ? '' : 's'}`);
    statusEl.textContent = parts.join(' • ') || 'No image loaded';
  }

  // ---------- modal ----------
  function showModal({ title, message, defaultValue, onOk, onCancel }) {
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    const modal = document.createElement('div');
    modal.className = 'modal';
    const h = document.createElement('h3'); h.textContent = title; modal.appendChild(h);
    if (message) {
      const p = document.createElement('p'); p.textContent = message; modal.appendChild(p);
    }
    const input = document.createElement('input');
    input.type = 'number'; input.step = 'any'; input.min = '0';
    input.placeholder = 'e.g. 2.5';
    if (defaultValue !== '' && defaultValue != null) input.value = defaultValue;
    modal.appendChild(input);
    const actions = document.createElement('div'); actions.className = 'actions';
    const cancel = document.createElement('button'); cancel.textContent = 'Cancel';
    const ok = document.createElement('button'); ok.textContent = 'OK'; ok.className = 'primary';
    actions.appendChild(cancel); actions.appendChild(ok);
    modal.appendChild(actions);
    bg.appendChild(modal); document.body.appendChild(bg);
    setTimeout(() => { input.focus(); input.select(); }, 0);

    function close(val) {
      bg.remove();
      if (val == null) { onCancel && onCancel(); }
      else { onOk && onOk(val); }
    }
    cancel.addEventListener('click', () => close(null));
    ok.addEventListener('click', () => close(parseFloat(input.value)));
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') close(parseFloat(input.value));
      else if (e.key === 'Escape') close(null);
    });
    bg.addEventListener('click', e => { if (e.target === bg) close(null); });
  }

  // Multi-field variant of showModal. Fields: [{label, placeholder?, defaultValue?}].
  // onOk receives an array of parsed numbers (NaN for empty/invalid).
  function showFieldsModal({ title, message, fields, onOk, onCancel }) {
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    const modal = document.createElement('div');
    modal.className = 'modal';
    const h = document.createElement('h3'); h.textContent = title; modal.appendChild(h);
    if (message) {
      const p = document.createElement('p'); p.textContent = message; modal.appendChild(p);
    }
    const inputs = fields.map(f => {
      const lbl = document.createElement('div');
      lbl.className = 'field-label';
      lbl.textContent = f.label;
      modal.appendChild(lbl);
      const input = document.createElement('input');
      input.type = 'number'; input.step = 'any'; input.min = '0';
      input.placeholder = f.placeholder || 'e.g. 1.5';
      if (f.defaultValue != null && f.defaultValue !== '') input.value = f.defaultValue;
      modal.appendChild(input);
      return input;
    });
    const actions = document.createElement('div'); actions.className = 'actions';
    const cancel = document.createElement('button'); cancel.textContent = 'Cancel';
    const ok = document.createElement('button'); ok.textContent = 'OK'; ok.className = 'primary';
    actions.appendChild(cancel); actions.appendChild(ok);
    modal.appendChild(actions);
    bg.appendChild(modal); document.body.appendChild(bg);
    setTimeout(() => { inputs[0].focus(); inputs[0].select(); }, 0);

    function submit() {
      close(inputs.map(i => parseFloat(i.value)));
    }
    function close(vals) {
      bg.remove();
      if (vals == null) onCancel && onCancel();
      else onOk && onOk(vals);
    }
    cancel.addEventListener('click', () => close(null));
    ok.addEventListener('click', submit);
    inputs.forEach((input, i) => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (i < inputs.length - 1) inputs[i + 1].focus();
          else submit();
        } else if (e.key === 'Escape') close(null);
      });
    });
    bg.addEventListener('click', e => { if (e.target === bg) close(null); });
  }

  // ---------- boot ----------
  load();
  applyImageOpacity();
  applyImageScale();
  if (!state.imageDataUrl) {
    applyTransform();
    render();
  }
  window.addEventListener('resize', () => {
    updateStatus();
  });
})();
</script>
</body>
</html>
