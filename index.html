<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Floor Plan Measure</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column;
    background: #1a1a1a; color: #eee;
    overflow: hidden;
  }
  #toolbar {
    display: flex; gap: 6px; padding: 8px;
    background: #2a2a2a; border-bottom: 1px solid #444;
    align-items: center; flex-wrap: wrap;
  }
  #toolbar button, #toolbar label.btn {
    background: #3a3a3a; color: #eee;
    border: 1px solid #555; padding: 6px 10px;
    border-radius: 4px; cursor: pointer; font-size: 13px;
    line-height: 1;
  }
  #toolbar button:hover, #toolbar label.btn:hover { background: #4a4a4a; }
  #toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }
  #toolbar button.active { background: #2d5a8a; border-color: #4a8acc; }
  #toolbar .sep { width: 1px; height: 22px; background: #555; margin: 0 2px; }
  #toolbar .dropdown { position: relative; display: inline-block; }
  #toolbar .dropdown-menu {
    position: absolute; top: calc(100% + 4px); left: 0;
    background: #2a2a2a; border: 1px solid #555;
    border-radius: 4px; padding: 4px;
    display: flex; flex-direction: column; gap: 2px;
    min-width: 160px; z-index: 50;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  }
  #toolbar .dropdown-menu[hidden] { display: none; }
  #toolbar .dropdown-menu button,
  #toolbar .dropdown-menu label.menu-item {
    background: transparent; color: #eee;
    border: none; padding: 6px 10px;
    border-radius: 3px; cursor: pointer; font-size: 13px;
    text-align: left; line-height: 1.4;
  }
  #toolbar .dropdown-menu button:hover,
  #toolbar .dropdown-menu label.menu-item:hover { background: #4a4a4a; }
  #toolbar .info { font-size: 12px; color: #aaa; margin-left: auto; font-family: monospace; }
  #toolbar .dropdown-menu .slider-control,
  #toolbar .dropdown-menu .menu-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; color: #aaa; font-size: 12px;
  }
  #toolbar .dropdown-menu .slider-control > span,
  #toolbar .dropdown-menu .menu-row > span { min-width: 52px; }
  #toolbar .dropdown-menu .slider-control input[type=range] {
    flex: 1; min-width: 120px; accent-color: #4a8acc; cursor: pointer;
  }
  #toolbar .dropdown-menu .menu-row-buttons {
    display: flex; gap: 4px; margin-left: auto;
  }
  #toolbar .dropdown-menu .menu-row-buttons button {
    background: #3a3a3a; color: #eee;
    border: 1px solid #555; padding: 4px 8px;
    border-radius: 3px; cursor: pointer; font-size: 12px;
    line-height: 1; min-width: 36px; text-align: center;
  }
  #toolbar .dropdown-menu .menu-row-buttons button:hover { background: #4a4a4a; }
  #main { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  #canvas-container {
    flex: 1; position: relative; overflow: hidden;
    background: #0d0d0d; cursor: crosshair;
  }
  #canvas-container.pan-mode { cursor: grab; }
  #canvas-container.grabbing { cursor: grabbing !important; }
  #world { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
  #world img { display: block; user-select: none; -webkit-user-drag: none; pointer-events: none; }
  #world svg { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; }
  #drop-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #666; font-size: 16px; pointer-events: none;
    flex-direction: column; gap: 8px;
  }
  #drop-hint .sub { font-size: 13px; color: #555; }
  #canvas-container.dragover { background: #1a2a3a; }
  #sidebar {
    width: 280px; background: #2a2a2a; border-left: 1px solid #444;
    padding: 12px; overflow-y: auto;
  }
  #sidebar h3 {
    margin: 0 0 8px; font-size: 11px; text-transform: uppercase;
    color: #888; letter-spacing: 0.8px; font-weight: 600;
  }
  .measurement {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; margin-bottom: 4px;
    background: #333; border-radius: 4px; font-size: 13px;
    border-left: 3px solid #4a7fbf;
  }
  .measurement.calibration { border-left-color: #5fbf6f; background: #2e3a2e; }
  .measurement.selected { outline: 2px solid #ffaa33; outline-offset: -1px; }
  .measurement { cursor: pointer; }
  .measurement .label { color: #fff; font-weight: 500; }
  .measurement .length-input {
    background: transparent; color: inherit;
    font: inherit; font-weight: inherit;
    border: 1px solid transparent; border-radius: 3px;
    padding: 1px 4px; margin: -1px -4px;
    width: 96px;
  }
  .measurement .length-input:hover { border-color: #555; }
  .measurement .length-input:focus {
    background: #1a1a1a; border-color: #4a8acc; outline: none;
  }
  .measurement .name-input {
    background: transparent; color: inherit; font: inherit; font-weight: 500;
    border: 1px solid transparent; border-radius: 3px;
    padding: 1px 4px; margin: -1px -4px;
    width: 100%; min-width: 0;
  }
  .measurement .name-input::placeholder { color: #888; font-style: italic; }
  .measurement .name-input:hover { border-color: #555; }
  .measurement .name-input:focus {
    background: #1a1a1a; border-color: #4a8acc; outline: none;
  }
  .measurement .meta { color: #999; font-size: 11px; margin-top: 2px; }
  .measurement .actions { display: flex; gap: 4px; }
  .measurement button {
    background: #444; color: #ccc; border: none;
    padding: 3px 8px; border-radius: 3px; cursor: pointer; font-size: 11px;
  }
  .measurement button:hover { background: #555; color: #fff; }
  .measurement button.del:hover { background: #7a3333; color: #fff; }
  #empty-hint { color: #777; font-size: 12px; font-style: italic; padding: 8px 4px; line-height: 1.5; }
  #file-input, #project-input { display: none; }
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal {
    background: #2a2a2a; border: 1px solid #555;
    border-radius: 6px; padding: 20px; min-width: 320px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .modal h3 { margin: 0 0 6px; font-size: 15px; }
  .modal p { margin: 0 0 12px; color: #aaa; font-size: 13px; }
  .modal input {
    width: 100%; padding: 8px 10px; background: #1a1a1a; color: #fff;
    border: 1px solid #555; border-radius: 4px; font-size: 14px;
  }
  .modal input:focus { outline: none; border-color: #4a8acc; }
  .modal .actions { margin-top: 14px; display: flex; gap: 8px; justify-content: flex-end; }
  .modal .actions button {
    background: #3a3a3a; color: #eee; border: 1px solid #555;
    padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .modal .actions button.primary { background: #2d5a8a; border-color: #4a8acc; }
  .modal .actions button:hover { background: #4a4a4a; }
  .modal .actions button.primary:hover { background: #3a6aaa; }
  .modal .field-label { font-size: 12px; color: #aaa; margin: 10px 0 4px; }
  .modal .field-label:first-of-type { margin-top: 0; }
  .measurement.shape { border-left-color: #999; background: #333; }
  .measurement .dims { color: #ccc; }
  .measurement .area { color: #888; font-size: 11px; margin-top: 2px; }
  .measurement.opening { border-left-color: #e08a3d; }
  .measurement.opening.window { border-left-color: #ff5fa8; }
  .measurement.opening .meta.door { color: #e08a3d; }
  .measurement.opening .meta.window { color: #ff5fa8; }
  #canvas-container.placing { cursor: crosshair; }
</style>
</head>
<body>
<div id="toolbar">
  <label class="btn" for="file-input">Upload image</label>
  <input id="file-input" type="file" accept="image/*">
  <div class="dropdown">
    <button id="project-menu-btn" type="button" title="Project file operations">Project ▾</button>
    <div class="dropdown-menu" id="project-menu" hidden>
      <button id="save-project-btn" type="button" title="Download a project file (image + measurements as a single .fpm.json)">Save project</button>
      <label class="menu-item" for="project-input">Load project</label>
      <input id="project-input" type="file" accept=".fpm.json,.json,application/json">
      <button id="export-btn" type="button" title="Download a PNG with the image and all measurements (E)">Export PNG</button>
    </div>
  </div>
  <span class="sep"></span>
  <button id="undo-btn" title="Undo (Ctrl/Cmd+Z)" disabled>Undo</button>
  <button id="redo-btn" title="Redo (Ctrl/Cmd+Shift+Z or Ctrl/Cmd+Y)" disabled>Redo</button>
  <span class="sep"></span>
  <button id="calibrate-btn" title="Edit the scale-reference length">Set scale…</button>
  <button id="pan-btn" title="Toggle pan mode (or hold Shift / middle-click)">Pan</button>
  <div class="dropdown">
    <button id="image-menu-btn" type="button" title="Image controls (rotate, opacity, zoom)">Image ▾</button>
    <div class="dropdown-menu" id="image-menu" hidden>
      <button id="rotate-btn" title="Rotate image and measurements 90° clockwise (R)">Rotate 90°</button>
      <label class="slider-control" title="Background image opacity">
        <span>Opacity</span>
        <input type="range" id="opacity-input" min="0" max="100" value="100">
      </label>
      <label class="slider-control" title="Stretch the background image horizontally — corrects distorted floor plans. Lines are not affected.">
        <span>Stretch X</span>
        <input type="range" id="stretch-x-input" min="50" max="200" step="1" value="100">
      </label>
      <label class="slider-control" title="Stretch the background image vertically — corrects distorted floor plans. Lines are not affected.">
        <span>Stretch Y</span>
        <input type="range" id="stretch-y-input" min="50" max="200" step="1" value="100">
      </label>
      <button id="reset-stretch-btn" type="button" title="Reset both stretch sliders to 100%">Reset stretch</button>
      <div class="menu-row" title="Zoom controls">
        <span>Zoom</span>
        <div class="menu-row-buttons">
          <button id="zoom-out-btn" title="Zoom out">−</button>
          <button id="zoom-in-btn" title="Zoom in">+</button>
          <button id="zoom-fit-btn" title="Fit image to view">Fit</button>
          <button id="zoom-100-btn" title="Actual size">1:1</button>
        </div>
      </div>
    </div>
  </div>
  <div class="dropdown">
    <button id="shape-menu-btn" type="button" title="Add an element (circle, rectangle, door or window). Requires the scale to be set first.">Add element ▾</button>
    <div class="dropdown-menu" id="shape-menu" hidden>
      <button id="add-circle-btn" type="button" title="Add a circular object">Circle…</button>
      <button id="add-rect-btn" type="button" title="Add a rectangular object">Rectangle…</button>
      <button id="add-door-btn" type="button" title="Add a door opening — click two points to span it across a wall">Door</button>
      <button id="add-window-btn" type="button" title="Add a window opening — click two points to span it across a wall">Window</button>
    </div>
  </div>
  <span class="sep"></span>
  <button id="clear-lines-btn" title="Remove all measurements and shapes">Clear lines</button>
  <button id="reset-btn" title="Remove image and all measurements">Reset all</button>
  <span class="info" id="status">No image loaded</span>
</div>
<div id="main">
  <div id="canvas-container">
    <div id="world">
      <img id="img" alt="" style="display:none">
      <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="drop-hint">
      <div>Drop a floor plan image here or use "Upload image"</div>
      <div class="sub">PNG, JPG, WebP — anything the browser can render</div>
    </div>
  </div>
  <div id="sidebar">
    <h3>Measurements</h3>
    <div id="measurements-list"></div>
  </div>
</div>
<script>
(function () {
  const STORAGE_KEY = 'floorplan-measure-v1';

  const defaultState = () => ({
    imageDataUrl: null,
    imageW: 0,
    imageH: 0,
    lines: [],          // {id, x1, y1, x2, y2, realLength?}
    shapes: [],         // {id, type:'circle'|'rect', cx, cy, radiusM?, widthM?, lengthM?, angle?}
    openings: [],       // {id, type:'door'|'window', x1, y1, x2, y2} — door/window markers.
                        // Endpoints in image-pixel coords, like lines. Purely visual: they
                        // mask the wall they cross but never affect length/area calculations.
    calibrationLineId: null,
    pixelsPerMeter: null,
    zoom: 1,
    panX: 0,
    panY: 0,
    rotation: 0,        // 0, 90, 180, 270 — clockwise
    imageOpacity: 1,    // 0..1, applies only to the background image (not the lines/labels)
    imageScaleX: 1,     // horizontal stretch of the background image. Lines stay in
    imageScaleY: 1,     // image-pixel coords — used to correct distorted floor plans.
  });

  let state = defaultState();
  let nextLineId = 1;
  let nextShapeId = 1;
  let nextOpeningId = 1;
  let drawingLine = null;   // {x1, y1}
  let mouseWorld = null;
  let panModeToggle = false;
  let drag = null;          // {x, y, isPan, startPanX, startPanY}
  let selectedLineId = null;
  let selectedShapeId = null;
  let selectedOpeningId = null;
  let clipboardLine = null; // {x1, y1, x2, y2} — last copied line geometry
  let clipboardShape = null; // last copied shape (sans id); null when a line is the active clipboard
  let clipboardOpening = null; // last copied opening (sans id); null when another type is active
  let pendingShape = null;  // {type, radiusM?, widthM?, lengthM?} — waiting for next click to place
  let drawOpeningType = null; // 'door' | 'window' while click-click placing an opening

  const container = document.getElementById('canvas-container');
  const world = document.getElementById('world');
  const img = document.getElementById('img');
  const svg = document.getElementById('svg');
  const measurementsList = document.getElementById('measurements-list');
  const statusEl = document.getElementById('status');
  const dropHint = document.getElementById('drop-hint');
  const fileInput = document.getElementById('file-input');
  const panBtn = document.getElementById('pan-btn');
  const opacityInput = document.getElementById('opacity-input');
  const stretchXInput = document.getElementById('stretch-x-input');
  const stretchYInput = document.getElementById('stretch-y-input');
  const shapeMenuBtn = document.getElementById('shape-menu-btn');
  const shapeMenu = document.getElementById('shape-menu');

  function applyImageOpacity() {
    const o = state.imageOpacity == null ? 1 : Math.max(0, Math.min(1, state.imageOpacity));
    img.style.opacity = String(o);
    if (opacityInput) opacityInput.value = String(Math.round(o * 100));
  }

  // Stretch lives on the <img> only — the SVG (which holds the lines) is unaffected,
  // so line coordinates stay in unstretched image-pixel space. Top-left transform
  // origin keeps image-pixel coord (0,0) anchored to world (0,0), which matches the
  // SVG's viewBox.
  function applyImageScale() {
    const sx = state.imageScaleX == null ? 1 : Math.max(0.01, state.imageScaleX);
    const sy = state.imageScaleY == null ? 1 : Math.max(0.01, state.imageScaleY);
    img.style.transformOrigin = '0 0';
    img.style.transform = `scale(${sx}, ${sy})`;
    if (stretchXInput) stretchXInput.value = String(Math.round(sx * 100));
    if (stretchYInput) stretchYInput.value = String(Math.round(sy * 100));
  }

  const SVG_NS = 'http://www.w3.org/2000/svg';
  const DOOR_COLOR = '#e08a3d';
  const WINDOW_COLOR = '#ff5fa8';
  const openingColor = op => (op.type === 'window' ? WINDOW_COLOR : DOOR_COLOR);

  // ---------- persistence ----------
  let saveTimer = null;
  function save() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.warn('Could not persist state (storage full?):', e);
      }
    }, 150);
  }

  function load() {
    const data = localStorage.getItem(STORAGE_KEY);
    if (!data) return;
    try {
      const loaded = JSON.parse(data);
      state = Object.assign(defaultState(), loaded);
      if (!Array.isArray(state.shapes)) state.shapes = [];
      if (!Array.isArray(state.openings)) state.openings = [];
      if (state.lines.length) {
        nextLineId = Math.max(...state.lines.map(l => l.id)) + 1;
      }
      if (state.shapes.length) {
        nextShapeId = Math.max(...state.shapes.map(s => s.id)) + 1;
      }
      if (state.openings.length) {
        nextOpeningId = Math.max(...state.openings.map(o => o.id)) + 1;
      }
      if (state.imageDataUrl) {
        loadImage(true);
      } else {
        applyTransform();
        render();
      }
    } catch (e) {
      console.warn('Failed to restore state:', e);
    }
  }

  // ---------- undo/redo ----------
  // Snapshot-based history of the data state (lines + calibration).
  // View state (zoom/pan/rotation) and the image itself are NOT historied.
  const UNDO_LIMIT = 100;
  const COALESCE_MS = 1000;
  const undoStack = [];
  const redoStack = [];
  let lastCommitKey = null;
  let lastCommitAt = 0;
  const undoBtn = document.getElementById('undo-btn');
  const redoBtn = document.getElementById('redo-btn');

  function dataSnapshot() {
    return {
      lines: state.lines.map(l => ({ ...l })),
      shapes: state.shapes.map(s => ({ ...s })),
      openings: state.openings.map(o => ({ ...o })),
      calibrationLineId: state.calibrationLineId,
      pixelsPerMeter: state.pixelsPerMeter,
    };
  }

  function applySnapshot(snap) {
    state.lines = snap.lines.map(l => ({ ...l }));
    state.shapes = (snap.shapes || []).map(s => ({ ...s }));
    state.openings = (snap.openings || []).map(o => ({ ...o }));
    state.calibrationLineId = snap.calibrationLineId;
    state.pixelsPerMeter = snap.pixelsPerMeter;
    if (selectedLineId != null && !state.lines.some(l => l.id === selectedLineId)) {
      selectedLineId = null;
    }
    if (selectedShapeId != null && !state.shapes.some(s => s.id === selectedShapeId)) {
      selectedShapeId = null;
    }
    if (selectedOpeningId != null && !state.openings.some(o => o.id === selectedOpeningId)) {
      selectedOpeningId = null;
    }
    if (!state.pixelsPerMeter && pendingShape) {
      pendingShape = null;
      updatePlacingCursor();
    }
  }

  // Call before mutating data. coalesceKey lets a run of similar actions
  // (e.g. arrow-key nudges) collapse into a single undo step.
  function commit(coalesceKey) {
    const now = Date.now();
    if (coalesceKey && coalesceKey === lastCommitKey && (now - lastCommitAt) < COALESCE_MS) {
      lastCommitAt = now;
      redoStack.length = 0;
      updateUndoButtons();
      return;
    }
    undoStack.push(dataSnapshot());
    if (undoStack.length > UNDO_LIMIT) undoStack.shift();
    redoStack.length = 0;
    lastCommitKey = coalesceKey || null;
    lastCommitAt = now;
    updateUndoButtons();
  }

  function undo() {
    if (drag || !undoStack.length) return;
    const snap = undoStack.pop();
    redoStack.push(dataSnapshot());
    applySnapshot(snap);
    lastCommitKey = null;
    drawingLine = null;
    updateUndoButtons();
    save();
    render();
  }

  function redo() {
    if (drag || !redoStack.length) return;
    const snap = redoStack.pop();
    undoStack.push(dataSnapshot());
    applySnapshot(snap);
    lastCommitKey = null;
    drawingLine = null;
    updateUndoButtons();
    save();
    render();
  }

  function clearHistory() {
    undoStack.length = 0;
    redoStack.length = 0;
    lastCommitKey = null;
    updateUndoButtons();
  }

  function updateUndoButtons() {
    undoBtn.disabled = undoStack.length === 0;
    redoBtn.disabled = redoStack.length === 0;
  }

  // ---------- save / load project ----------
  // Single self-contained JSON file: image (as data URL) + all measurement state.
  // No external library — the image is already stored as a base64 data URL.
  const PROJECT_FORMAT = 'floorplan-measure';
  const PROJECT_VERSION = 1;
  const projectInput = document.getElementById('project-input');

  function saveProject() {
    if (!state.imageDataUrl) {
      alert('Nothing to save — upload an image first.');
      return;
    }
    const payload = {
      format: PROJECT_FORMAT,
      version: PROJECT_VERSION,
      savedAt: new Date().toISOString(),
      state,
    };
    const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'floorplan-project.fpm.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function loadProject(file) {
    const reader = new FileReader();
    reader.onload = () => {
      let payload;
      try {
        payload = JSON.parse(reader.result);
      } catch (e) {
        alert('Could not load: file is not valid JSON.');
        return;
      }
      if (!payload || payload.format !== PROJECT_FORMAT || !payload.state || !Array.isArray(payload.state.lines)) {
        alert('Could not load: this does not look like a Floor Plan Measure project file.');
        return;
      }
      state = Object.assign(defaultState(), payload.state);
      if (!Array.isArray(state.shapes)) state.shapes = [];
      if (!Array.isArray(state.openings)) state.openings = [];
      nextLineId = state.lines.length ? Math.max(...state.lines.map(l => l.id)) + 1 : 1;
      nextShapeId = state.shapes.length ? Math.max(...state.shapes.map(s => s.id)) + 1 : 1;
      nextOpeningId = state.openings.length ? Math.max(...state.openings.map(o => o.id)) + 1 : 1;
      drawingLine = null;
      selectedLineId = null;
      selectedShapeId = null;
      selectedOpeningId = null;
      pendingShape = null;
      drawOpeningType = null;
      clearHistory();
      if (state.imageDataUrl) {
        loadImage(true);
      } else {
        applyTransform();
        render();
      }
      save();
    };
    reader.onerror = () => alert('Could not read the project file.');
    reader.readAsText(file);
  }

  function looksLikeProject(file) {
    const name = (file.name || '').toLowerCase();
    return name.endsWith('.fpm.json') || name.endsWith('.fpm') || file.type === 'application/json';
  }

  // ---------- image loading ----------
  function loadImage(preserveView) {
    img.onload = () => {
      state.imageW = img.naturalWidth;
      state.imageH = img.naturalHeight;
      img.style.display = '';
      applyImageOpacity();
      applyImageScale();
      dropHint.style.display = 'none';
      if (!preserveView) {
        fitToView();
      } else {
        applyTransform();
        render();
      }
      save();
    };
    img.onerror = () => {
      console.warn('Saved image failed to load — clearing.');
      state.imageDataUrl = null;
      save();
    };
    img.src = state.imageDataUrl;
  }

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      state = defaultState();
      state.imageDataUrl = reader.result;
      drawingLine = null;
      selectedLineId = null;
      selectedShapeId = null;
      selectedOpeningId = null;
      pendingShape = null;
      drawOpeningType = null;
      clearHistory();
      loadImage(false);
    };
    reader.readAsDataURL(file);
  }

  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) loadFile(file);
    fileInput.value = '';
  });

  container.addEventListener('dragover', e => {
    e.preventDefault();
    container.classList.add('dragover');
  });
  container.addEventListener('dragleave', e => {
    if (e.target === container) container.classList.remove('dragover');
  });
  container.addEventListener('drop', e => {
    e.preventDefault();
    container.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    if (looksLikeProject(file)) loadProject(file);
    else if (file.type.startsWith('image/')) loadFile(file);
  });

  // ---------- rotation helpers ----------
  function normRotation() {
    return ((state.rotation % 360) + 360) % 360;
  }

  // Union of the unstretched line/SVG area and the stretched image. The view
  // helpers (rotationOffset, rotatedBBox) work in these dimensions so Fit/1:1/
  // rotate stay correct when the stretch sliders push the image past the
  // original image bounds.
  function stretchedBounds() {
    const sx = state.imageScaleX == null ? 1 : Math.max(0.01, state.imageScaleX);
    const sy = state.imageScaleY == null ? 1 : Math.max(0.01, state.imageScaleY);
    return {
      boundW: Math.max(state.imageW, state.imageW * sx),
      boundH: Math.max(state.imageH, state.imageH * sy),
    };
  }

  // Translation that puts the rotated union's bbox at (0,0).
  // Transform order applied to a point p: rotate(θ), then translate(tx, ty).
  function rotationOffset() {
    const r = normRotation();
    const { boundW, boundH } = stretchedBounds();
    if (r === 90)  return [boundH, 0];
    if (r === 180) return [boundW, boundH];
    if (r === 270) return [0, boundW];
    return [0, 0];
  }

  function rotatedBBox() {
    const r = normRotation();
    const { boundW, boundH } = stretchedBounds();
    return (r === 90 || r === 270)
      ? [boundH, boundW]
      : [boundW, boundH];
  }

  // Image-pixel coords → world coords (the space scale/pan act on).
  function imageToWorld(px, py) {
    const [tx, ty] = rotationOffset();
    const θ = normRotation() * Math.PI / 180;
    const c = Math.cos(θ), s = Math.sin(θ);
    return { x: tx + (px * c - py * s), y: ty + (px * s + py * c) };
  }

  // ---------- coords ----------
  function screenToWorld(sx, sy) {
    const rect = container.getBoundingClientRect();
    // Undo translate(panX, panY) scale(zoom)
    let x = (sx - rect.left - state.panX) / state.zoom;
    let y = (sy - rect.top - state.panY) / state.zoom;
    // Undo translate(tx, ty) rotate(θ) — returns image-pixel coords.
    const [tx, ty] = rotationOffset();
    x -= tx;
    y -= ty;
    const θ = -normRotation() * Math.PI / 180;
    const c = Math.cos(θ), s = Math.sin(θ);
    return { x: x * c - y * s, y: x * s + y * c };
  }

  function applyTransform() {
    const [tx, ty] = rotationOffset();
    world.style.transform =
      `translate(${state.panX}px, ${state.panY}px) scale(${state.zoom})` +
      ` translate(${tx}px, ${ty}px) rotate(${state.rotation}deg)`;
    updateStatus();
  }

  // ---------- rendering ----------
  function render() {
    svg.setAttribute('width', state.imageW || 0);
    svg.setAttribute('height', state.imageH || 0);
    svg.setAttribute('viewBox', `0 0 ${state.imageW || 1} ${state.imageH || 1}`);

    while (svg.firstChild) svg.removeChild(svg.firstChild);

    const z = state.zoom;
    const scale = 1 / z;
    const strokeW = 2 * scale;
    const handleR = 4 * scale;
    const fontSize = 13 * scale;
    const labelOffset = 10 * scale;
    const jambHalf = 9 * scale;   // half-length of an opening's perpendicular jamb tick

    // Shapes go below the lines so endpoint handles and labels remain clickable when
    // they overlap a shape. No-op if calibration is missing, since dimensions are in
    // meters and need pixelsPerMeter to render at the right size.
    if (state.pixelsPerMeter) {
      for (const shape of state.shapes) {
        drawShape(shape, strokeW);
      }
    }

    // Openings (doors/windows) erase the wall they cross: a mask punches their span
    // out of the line group so the floor-plan image shows through, then jamb ticks are
    // drawn on top. The mask band matches the jamb height so the gap lines up visually.
    const hasOpenings = state.openings.length > 0;
    let linesParent = svg;
    if (hasOpenings) {
      svg.appendChild(buildOpeningMask(jambHalf));
      linesParent = document.createElementNS(SVG_NS, 'g');
      linesParent.setAttribute('mask', 'url(#opening-mask)');
    }

    for (const line of state.lines) {
      const isCal = line.id === state.calibrationLineId;
      drawLine(line, isCal ? '#5fbf6f' : '#4a9fff', strokeW, handleR, fontSize, labelOffset, linesParent);
    }
    if (hasOpenings) svg.appendChild(linesParent);

    for (const op of state.openings) {
      drawOpening(op, strokeW, handleR, jambHalf);
    }

    if (drawingLine && mouseWorld) {
      drawPreview(strokeW, fontSize, labelOffset);
    }

    if (pendingShape && mouseWorld && state.pixelsPerMeter) {
      drawShapePreview(strokeW);
    }

    const areaFontSize = 15 * scale;
    for (const a of findLoopAreas()) {
      drawAreaLabel(a, areaFontSize);
    }

    renderMeasurements();
    updateAddShapeBtn();
    updateStatus();
  }

  function drawShape(shape, strokeW) {
    const isSelected = shape.id === selectedShapeId;
    const fill = 'rgba(120, 120, 120, 0.5)';
    const stroke = isSelected ? '#ffaa33' : '#555';
    const sw = isSelected ? strokeW * 1.6 : strokeW;
    const ppm = state.pixelsPerMeter;

    if (shape.type === 'circle') {
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', shape.cx);
      c.setAttribute('cy', shape.cy);
      c.setAttribute('r', shape.radiusM * ppm);
      c.setAttribute('fill', fill);
      c.setAttribute('stroke', stroke);
      c.setAttribute('stroke-width', sw);
      svg.appendChild(c);
    } else if (shape.type === 'rect') {
      const wPx = shape.widthM * ppm;
      const hPx = shape.lengthM * ppm;
      const g = document.createElementNS(SVG_NS, 'g');
      g.setAttribute('transform', `translate(${shape.cx} ${shape.cy}) rotate(${shape.angle || 0})`);
      const r = document.createElementNS(SVG_NS, 'rect');
      r.setAttribute('x', -wPx / 2);
      r.setAttribute('y', -hPx / 2);
      r.setAttribute('width', wPx);
      r.setAttribute('height', hPx);
      r.setAttribute('fill', fill);
      r.setAttribute('stroke', stroke);
      r.setAttribute('stroke-width', sw);
      g.appendChild(r);
      if (isSelected) {
        // Rotation handle: a stem + knob above the top edge in the rect's local frame.
        // Lives well outside the body so drags are naturally tangential to the center,
        // sidestepping the radial-drag dead zone of the edge band.
        const offset = ROT_HANDLE_OFFSET / state.zoom;
        const knobR = ROT_HANDLE_RADIUS / state.zoom;
        const stem = document.createElementNS(SVG_NS, 'line');
        stem.setAttribute('x1', 0);
        stem.setAttribute('y1', -hPx / 2);
        stem.setAttribute('x2', 0);
        stem.setAttribute('y2', -hPx / 2 - offset);
        stem.setAttribute('stroke', '#ffaa33');
        stem.setAttribute('stroke-width', strokeW);
        g.appendChild(stem);
        const knob = document.createElementNS(SVG_NS, 'circle');
        knob.setAttribute('cx', 0);
        knob.setAttribute('cy', -hPx / 2 - offset);
        knob.setAttribute('r', knobR);
        knob.setAttribute('fill', '#ffaa33');
        knob.setAttribute('stroke', '#fff');
        knob.setAttribute('stroke-width', strokeW * 0.6);
        g.appendChild(knob);
      }
      svg.appendChild(g);
    }
  }

  function drawShapePreview(strokeW) {
    const dash = 6 / state.zoom;
    const fill = 'rgba(120, 120, 120, 0.35)';
    const stroke = '#ffaa33';
    const ppm = state.pixelsPerMeter;

    if (pendingShape.type === 'circle') {
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', mouseWorld.x);
      c.setAttribute('cy', mouseWorld.y);
      c.setAttribute('r', pendingShape.radiusM * ppm);
      c.setAttribute('fill', fill);
      c.setAttribute('stroke', stroke);
      c.setAttribute('stroke-width', strokeW);
      c.setAttribute('stroke-dasharray', `${dash} ${dash}`);
      svg.appendChild(c);
    } else if (pendingShape.type === 'rect') {
      const wPx = pendingShape.widthM * ppm;
      const hPx = pendingShape.lengthM * ppm;
      const r = document.createElementNS(SVG_NS, 'rect');
      r.setAttribute('x', -wPx / 2);
      r.setAttribute('y', -hPx / 2);
      r.setAttribute('width', wPx);
      r.setAttribute('height', hPx);
      r.setAttribute('fill', fill);
      r.setAttribute('stroke', stroke);
      r.setAttribute('stroke-width', strokeW);
      r.setAttribute('stroke-dasharray', `${dash} ${dash}`);
      r.setAttribute('transform', `translate(${mouseWorld.x} ${mouseWorld.y})`);
      svg.appendChild(r);
    }
  }

  // parent (default svg) holds the stroke + endpoint handles; passing the masked group
  // lets openings punch gaps in the wall. The length label always goes on svg so it
  // stays visible even where an opening crosses the line.
  function drawLine(line, color, strokeW, handleR, fontSize, labelOffset, parent) {
    const p = parent || svg;
    const isSelected = line.id === selectedLineId;
    const sw = isSelected ? strokeW * 1.8 : strokeW;
    const hr = isSelected ? handleR * 1.5 : handleR;

    const ln = document.createElementNS(SVG_NS, 'line');
    ln.setAttribute('x1', line.x1);
    ln.setAttribute('y1', line.y1);
    ln.setAttribute('x2', line.x2);
    ln.setAttribute('y2', line.y2);
    ln.setAttribute('stroke', color);
    ln.setAttribute('stroke-width', sw);
    ln.setAttribute('stroke-linecap', 'round');
    p.appendChild(ln);

    for (const [x, y] of [[line.x1, line.y1], [line.x2, line.y2]]) {
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', x);
      c.setAttribute('cy', y);
      c.setAttribute('r', hr);
      c.setAttribute('fill', color);
      if (isSelected) {
        c.setAttribute('stroke', '#ffaa33');
        c.setAttribute('stroke-width', strokeW);
      }
      p.appendChild(c);
    }

    const lengthM = computeLengthMeters(line);
    if (lengthM != null) {
      drawLabel(line, formatLength(lengthM), color, fontSize, labelOffset);
    }
  }

  // Geometry shared by opening rendering, masking and hit-testing. All in image-pixel
  // coords: u = unit vector along the opening, n = unit perpendicular, (mx,my) = midpoint.
  function openingGeom(op) {
    const dx = op.x2 - op.x1, dy = op.y2 - op.y1;
    const L = Math.hypot(dx, dy) || 1;
    return {
      dx, dy, L,
      ux: dx / L, uy: dy / L,
      nx: -dy / L, ny: dx / L,
      mx: (op.x1 + op.x2) / 2, my: (op.y1 + op.y2) / 2,
    };
  }

  // A luminance mask: white shows the wall, black rectangles (one per opening, the
  // band running along the opening) hide it so the image behind the SVG shows through.
  // userSpaceOnUse with a huge region avoids clipping lines drawn outside the image.
  function buildOpeningMask(jambHalf) {
    const defs = document.createElementNS(SVG_NS, 'defs');
    const mask = document.createElementNS(SVG_NS, 'mask');
    mask.setAttribute('id', 'opening-mask');
    mask.setAttribute('maskUnits', 'userSpaceOnUse');
    mask.setAttribute('x', -100000);
    mask.setAttribute('y', -100000);
    mask.setAttribute('width', 200000);
    mask.setAttribute('height', 200000);
    const bg = document.createElementNS(SVG_NS, 'rect');
    bg.setAttribute('x', -100000);
    bg.setAttribute('y', -100000);
    bg.setAttribute('width', 200000);
    bg.setAttribute('height', 200000);
    bg.setAttribute('fill', '#fff');
    mask.appendChild(bg);
    for (const op of state.openings) {
      const g = openingGeom(op);
      const angle = Math.atan2(g.dy, g.dx) * 180 / Math.PI;
      const r = document.createElementNS(SVG_NS, 'rect');
      r.setAttribute('x', -g.L / 2);
      r.setAttribute('y', -jambHalf);
      r.setAttribute('width', g.L);
      r.setAttribute('height', jambHalf * 2);
      r.setAttribute('fill', '#000');
      r.setAttribute('transform', `translate(${g.mx} ${g.my}) rotate(${angle})`);
      mask.appendChild(r);
    }
    defs.appendChild(mask);
    return defs;
  }

  // An opening: a dotted line spanning the gap (the wall behind it is erased by
  // buildOpeningMask) plus two perpendicular jamb ticks with grab handles at the
  // endpoints. No length label — the size shows only in the sidebar.
  function drawOpening(op, strokeW, handleR, jambHalf) {
    const isSel = op.id === selectedOpeningId;
    const base = openingColor(op);
    const color = isSel ? '#ffaa33' : base;
    const sw = isSel ? strokeW * 1.8 : strokeW;
    const hr = isSel ? handleR * 1.5 : handleR;
    const g = openingGeom(op);

    const dash = 4 / state.zoom;
    const span = document.createElementNS(SVG_NS, 'line');
    span.setAttribute('x1', op.x1);
    span.setAttribute('y1', op.y1);
    span.setAttribute('x2', op.x2);
    span.setAttribute('y2', op.y2);
    span.setAttribute('stroke', color);
    span.setAttribute('stroke-width', strokeW);
    span.setAttribute('stroke-linecap', 'round');
    span.setAttribute('stroke-dasharray', `${dash} ${dash * 1.5}`);
    svg.appendChild(span);

    for (const [x, y] of [[op.x1, op.y1], [op.x2, op.y2]]) {
      const jamb = document.createElementNS(SVG_NS, 'line');
      jamb.setAttribute('x1', x - g.nx * jambHalf);
      jamb.setAttribute('y1', y - g.ny * jambHalf);
      jamb.setAttribute('x2', x + g.nx * jambHalf);
      jamb.setAttribute('y2', y + g.ny * jambHalf);
      jamb.setAttribute('stroke', color);
      jamb.setAttribute('stroke-width', sw);
      jamb.setAttribute('stroke-linecap', 'round');
      svg.appendChild(jamb);

      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', x);
      c.setAttribute('cy', y);
      c.setAttribute('r', hr);
      c.setAttribute('fill', color);
      svg.appendChild(c);
    }
  }

  function drawPreview(strokeW, fontSize, labelOffset) {
    const dash = 5 / state.zoom;
    const color = drawOpeningType
      ? (drawOpeningType === 'window' ? WINDOW_COLOR : DOOR_COLOR)
      : '#ffaa33';
    const ln = document.createElementNS(SVG_NS, 'line');
    ln.setAttribute('x1', drawingLine.x1);
    ln.setAttribute('y1', drawingLine.y1);
    ln.setAttribute('x2', mouseWorld.x);
    ln.setAttribute('y2', mouseWorld.y);
    ln.setAttribute('stroke', color);
    ln.setAttribute('stroke-width', strokeW);
    ln.setAttribute('stroke-dasharray', `${dash} ${dash}`);
    ln.setAttribute('stroke-linecap', 'round');
    svg.appendChild(ln);

    const c = document.createElementNS(SVG_NS, 'circle');
    c.setAttribute('cx', drawingLine.x1);
    c.setAttribute('cy', drawingLine.y1);
    c.setAttribute('r', 4 / state.zoom);
    c.setAttribute('fill', color);
    svg.appendChild(c);

    if (state.pixelsPerMeter) {
      const dx = mouseWorld.x - drawingLine.x1;
      const dy = mouseWorld.y - drawingLine.y1;
      const lengthM = Math.sqrt(dx * dx + dy * dy) / state.pixelsPerMeter;
      drawLabel(
        { x1: drawingLine.x1, y1: drawingLine.y1, x2: mouseWorld.x, y2: mouseWorld.y },
        formatLength(lengthM), color, fontSize, labelOffset
      );
    }
  }

  function drawAreaLabel(label, fontSize) {
    const t = document.createElementNS(SVG_NS, 'text');
    t.setAttribute('x', label.cx);
    t.setAttribute('y', label.cy);
    t.setAttribute('font-size', fontSize);
    t.setAttribute('font-family', 'monospace');
    t.setAttribute('font-weight', '600');
    t.setAttribute('fill', '#ffd54a');
    t.setAttribute('stroke', '#000');
    t.setAttribute('stroke-width', fontSize * 0.3);
    t.setAttribute('stroke-linejoin', 'round');
    t.setAttribute('paint-order', 'stroke');
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    if (state.rotation) {
      t.setAttribute('transform', `rotate(${-state.rotation}, ${label.cx}, ${label.cy})`);
    }
    t.textContent = formatArea(label.areaM2);
    svg.appendChild(t);
  }

  function drawLabel(line, text, color, fontSize, labelOffset) {
    const mx = (line.x1 + line.x2) / 2;
    const my = (line.y1 + line.y2) / 2;
    const dx = line.x2 - line.x1;
    const dy = line.y2 - line.y1;
    const len = Math.sqrt(dx * dx + dy * dy) || 1;
    const nx = -dy / len;
    const ny = dx / len;
    const tx = mx + nx * labelOffset;
    const ty = my + ny * labelOffset;

    const t = document.createElementNS(SVG_NS, 'text');
    t.setAttribute('x', tx);
    t.setAttribute('y', ty);
    t.setAttribute('font-size', fontSize);
    t.setAttribute('font-family', 'monospace');
    t.setAttribute('font-weight', '600');
    t.setAttribute('fill', color);
    t.setAttribute('stroke', '#000');
    t.setAttribute('stroke-width', fontSize * 0.25);
    t.setAttribute('stroke-linejoin', 'round');
    t.setAttribute('paint-order', 'stroke');
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('dominant-baseline', 'middle');
    // Counter-rotate so text stays upright regardless of world rotation.
    if (state.rotation) {
      t.setAttribute('transform', `rotate(${-state.rotation}, ${tx}, ${ty})`);
    }
    t.textContent = text;
    svg.appendChild(t);
  }

  function renderMeasurements() {
    measurementsList.innerHTML = '';
    if (!state.lines.length && !state.shapes.length && !state.openings.length) {
      const hint = document.createElement('div');
      hint.id = 'empty-hint';
      if (!state.imageDataUrl) {
        hint.textContent = 'Upload a floor plan image to begin.';
      } else if (!state.pixelsPerMeter) {
        hint.textContent = 'Click two points on the image to draw the first line. You will then be asked for its real-world length to set the scale.';
      } else {
        hint.textContent = 'Click two points to add another measurement, or use Add element to place an object, door or window.';
      }
      measurementsList.appendChild(hint);
      return;
    }
    for (const line of state.lines) {
      const isCal = line.id === state.calibrationLineId;
      const isSel = line.id === selectedLineId;
      const lengthM = computeLengthMeters(line);
      const row = document.createElement('div');
      row.className = 'measurement'
        + (isCal ? ' calibration' : '')
        + (isSel ? ' selected' : '');
      row.title = 'Click to select (arrow keys to nudge, Shift+arrows for 10×)';
      row.addEventListener('click', () => {
        if (selectedLineId === line.id) {
          selectedLineId = null;
        } else {
          selectedLineId = line.id;
          selectedShapeId = null;
        }
        render();
      });

      const left = document.createElement('div');
      const label = document.createElement('div');
      label.className = 'label';
      if (lengthM == null) {
        label.textContent = 'no scale';
      } else {
        const input = document.createElement('input');
        input.className = 'length-input';
        input.type = 'text';
        input.value = formatLength(lengthM);
        input.spellcheck = false;
        input.title = 'Edit length — e.g. 2.5 (m), 250cm, 2500mm';
        input.addEventListener('click', e => { e.stopPropagation(); input.select(); });
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
          else if (e.key === 'Escape') { input.value = formatLength(lengthM); input.blur(); }
        });
        input.addEventListener('change', () => {
          const v = parseLengthInput(input.value);
          if (v > 0 && Math.abs(v - lengthM) > 1e-6) {
            setLineLengthMeters(line, v);
          } else {
            input.value = formatLength(lengthM);
          }
        });
        label.appendChild(input);
      }
      left.appendChild(label);
      if (isCal) {
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = 'scale reference';
        left.appendChild(meta);
      }
      row.appendChild(left);

      const actions = document.createElement('div');
      actions.className = 'actions';
      const stop = e => e.stopPropagation();
      if (isCal) {
        const edit = document.createElement('button');
        edit.textContent = 'Edit';
        edit.addEventListener('click', e => { stop(e); editCalibration(line); });
        actions.appendChild(edit);
      }
      if (isSel) {
        const horiz = document.createElement('button');
        horiz.textContent = '↔';
        horiz.title = 'Make line perfectly horizontal';
        horiz.addEventListener('click', e => { stop(e); alignLineToScreenAxis(line, false); });
        actions.appendChild(horiz);
        const vert = document.createElement('button');
        vert.textContent = '↕';
        vert.title = 'Make line perfectly vertical';
        vert.addEventListener('click', e => { stop(e); alignLineToScreenAxis(line, true); });
        actions.appendChild(vert);
      }
      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '×';
      del.title = 'Remove this measurement';
      del.addEventListener('click', e => { stop(e); removeLine(line.id); });
      actions.appendChild(del);
      row.appendChild(actions);

      measurementsList.appendChild(row);
    }

    for (const shape of state.shapes) {
      const isSel = shape.id === selectedShapeId;
      const row = document.createElement('div');
      row.className = 'measurement shape' + (isSel ? ' selected' : '');
      row.title = 'Click to select (drag on canvas to move; drag near a rectangle edge to rotate)';
      row.addEventListener('click', () => {
        if (selectedShapeId === shape.id) {
          selectedShapeId = null;
        } else {
          selectedShapeId = shape.id;
          selectedLineId = null;
        }
        render();
      });

      const left = document.createElement('div');
      left.style.flex = '1';
      left.style.minWidth = '0';
      const nameInput = document.createElement('input');
      nameInput.className = 'name-input';
      nameInput.type = 'text';
      nameInput.value = shape.name || '';
      // Placeholder doubles as the visible default: shows the dimensions when no
      // name is set, disappears the moment the user types one.
      nameInput.placeholder = shape.type === 'circle'
        ? `r=${formatLength(shape.radiusM)}`
        : `${formatLength(shape.widthM)} × ${formatLength(shape.lengthM)}`;
      nameInput.spellcheck = false;
      nameInput.title = 'Click to name this shape';
      nameInput.addEventListener('click', e => { e.stopPropagation(); nameInput.select(); });
      nameInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); nameInput.blur(); }
        else if (e.key === 'Escape') { nameInput.value = shape.name || ''; nameInput.blur(); }
      });
      nameInput.addEventListener('change', () => setShapeName(shape, nameInput.value));
      left.appendChild(nameInput);
      row.appendChild(left);

      const actions = document.createElement('div');
      actions.className = 'actions';
      const stop = e => e.stopPropagation();
      const edit = document.createElement('button');
      edit.textContent = 'Edit';
      edit.title = 'Edit dimensions';
      edit.addEventListener('click', e => { stop(e); editShape(shape); });
      actions.appendChild(edit);
      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '×';
      del.title = 'Remove this shape';
      del.addEventListener('click', e => { stop(e); removeShape(shape.id); });
      actions.appendChild(del);
      row.appendChild(actions);

      measurementsList.appendChild(row);
    }

    for (const op of state.openings) {
      const isSel = op.id === selectedOpeningId;
      const lengthM = computeLengthMeters(op);
      const typeLabel = op.type === 'window' ? 'Window' : 'Door';
      const row = document.createElement('div');
      row.className = 'measurement opening'
        + (op.type === 'window' ? ' window' : '')
        + (isSel ? ' selected' : '');
      row.title = 'Click to select (drag endpoints to resize/rotate, arrow keys to nudge)';
      row.addEventListener('click', () => {
        if (selectedOpeningId === op.id) {
          selectedOpeningId = null;
        } else {
          selectedOpeningId = op.id;
          selectedLineId = null;
          selectedShapeId = null;
        }
        render();
      });

      const left = document.createElement('div');
      const label = document.createElement('div');
      label.className = 'label';
      if (lengthM == null) {
        label.textContent = 'no scale';
      } else {
        const input = document.createElement('input');
        input.className = 'length-input';
        input.type = 'text';
        input.value = formatLength(lengthM);
        input.spellcheck = false;
        input.title = 'Edit width — e.g. 0.9 (m), 90cm, 900mm';
        input.addEventListener('click', e => { e.stopPropagation(); input.select(); });
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
          else if (e.key === 'Escape') { input.value = formatLength(lengthM); input.blur(); }
        });
        input.addEventListener('change', () => {
          const v = parseLengthInput(input.value);
          if (v > 0 && Math.abs(v - lengthM) > 1e-6) {
            setOpeningLengthMeters(op, v);
          } else {
            input.value = formatLength(lengthM);
          }
        });
        label.appendChild(input);
      }
      left.appendChild(label);
      const meta = document.createElement('div');
      meta.className = 'meta ' + op.type;
      meta.textContent = typeLabel;
      left.appendChild(meta);
      row.appendChild(left);

      const actions = document.createElement('div');
      actions.className = 'actions';
      const stop = e => e.stopPropagation();
      if (isSel) {
        const horiz = document.createElement('button');
        horiz.textContent = '↔';
        horiz.title = 'Make perfectly horizontal';
        horiz.addEventListener('click', e => { stop(e); alignOpeningToScreenAxis(op, false); });
        actions.appendChild(horiz);
        const vert = document.createElement('button');
        vert.textContent = '↕';
        vert.title = 'Make perfectly vertical';
        vert.addEventListener('click', e => { stop(e); alignOpeningToScreenAxis(op, true); });
        actions.appendChild(vert);
      }
      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '×';
      del.title = 'Remove this ' + typeLabel.toLowerCase();
      del.addEventListener('click', e => { stop(e); removeOpening(op.id); });
      actions.appendChild(del);
      row.appendChild(actions);

      measurementsList.appendChild(row);
    }
  }

  // ---------- measurement math ----------
  function computeLengthMeters(line) {
    if (!state.pixelsPerMeter) return null;
    const dx = line.x2 - line.x1;
    const dy = line.y2 - line.y1;
    return Math.sqrt(dx * dx + dy * dy) / state.pixelsPerMeter;
  }

  function formatLength(m) {
    if (m < 0.01) return (m * 1000).toFixed(1) + ' mm';
    if (m < 1) return (m * 100).toFixed(1) + ' cm';
    return m.toFixed(2) + ' m';
  }

  function formatArea(m2) {
    if (m2 < 0.01) return (m2 * 10000).toFixed(1) + ' cm²';
    return m2.toFixed(2) + ' m²';
  }

  // Detect closed polygons formed by lines whose endpoints meet (within tolerance).
  // Returns [{ cx, cy, areaM2 }] — one per interior face, position is the polygon
  // area-weighted centroid in image-pixel coords.
  //
  // Algorithm: cluster endpoints into vertices (union-find by proximity), then walk
  // the planar graph's half-edges. At each vertex, outgoing edges are sorted by polar
  // angle; from a half-edge u→v, the next face edge is the one immediately CW from the
  // reverse (v→u) in v's adjacency. Interior faces trace CCW visually on screen and
  // produce positive shoelace area in screen (Y-down) coords; the outer face of each
  // connected component traces the opposite way and is dropped.
  function findLoopAreas() {
    if (!state.pixelsPerMeter || state.lines.length < 3) return [];

    const TOL = 4;
    const TOL2 = TOL * TOL;

    const pts = [];
    for (const ln of state.lines) {
      pts.push({ x: ln.x1, y: ln.y1 });
      pts.push({ x: ln.x2, y: ln.y2 });
    }

    const parent = pts.map((_, i) => i);
    function find(i) {
      while (parent[i] !== i) { parent[i] = parent[parent[i]]; i = parent[i]; }
      return i;
    }
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x;
        const dy = pts[i].y - pts[j].y;
        if (dx * dx + dy * dy <= TOL2) parent[find(i)] = find(j);
      }
    }

    const rootToVertex = new Map();
    const vertices = [];
    const vCount = [];
    for (let i = 0; i < pts.length; i++) {
      const r = find(i);
      let vi = rootToVertex.get(r);
      if (vi === undefined) {
        vi = vertices.length;
        rootToVertex.set(r, vi);
        vertices.push({ x: 0, y: 0 });
        vCount.push(0);
      }
      vertices[vi].x += pts[i].x;
      vertices[vi].y += pts[i].y;
      vCount[vi]++;
    }
    for (let i = 0; i < vertices.length; i++) {
      vertices[i].x /= vCount[i];
      vertices[i].y /= vCount[i];
    }

    const adj = vertices.map(() => []);
    for (let i = 0; i < state.lines.length; i++) {
      const v1 = rootToVertex.get(find(i * 2));
      const v2 = rootToVertex.get(find(i * 2 + 1));
      if (v1 === v2) continue;
      const line = state.lines[i];
      const a = vertices[v1], b = vertices[v2];
      adj[v1].push({
        to: v2, edgeIdx: i,
        fromPt: { x: line.x1, y: line.y1 },
        toPt: { x: line.x2, y: line.y2 },
        angle: Math.atan2(b.y - a.y, b.x - a.x),
      });
      adj[v2].push({
        to: v1, edgeIdx: i,
        fromPt: { x: line.x2, y: line.y2 },
        toPt: { x: line.x1, y: line.y1 },
        angle: Math.atan2(a.y - b.y, a.x - b.x),
      });
    }
    for (const list of adj) list.sort((p, q) => p.angle - q.angle);

    const visited = new Set();
    const faces = [];
    for (let u = 0; u < vertices.length; u++) {
      for (const out of adj[u]) {
        if (visited.has(u + '|' + out.edgeIdx)) continue;
        const faceEdges = [];
        let cu = u, co = out;
        for (let safety = 0; safety < 10000; safety++) {
          const k = cu + '|' + co.edgeIdx;
          if (visited.has(k)) break;
          visited.add(k);
          faceEdges.push(co);
          const v = co.to;
          const adjV = adj[v];
          const revIdx = adjV.findIndex(e => e.edgeIdx === co.edgeIdx);
          if (revIdx === -1) break;
          cu = v;
          co = adjV[(revIdx - 1 + adjV.length) % adjV.length];
        }
        if (faceEdges.length >= 3) {
          // Topology uses clustered endpoints; geometry uses only this face's edges
          // so dangling lines near a corner cannot distort the polygon area.
          faces.push(faceEdges.map((edge, i) => {
            const prev = faceEdges[(i - 1 + faceEdges.length) % faceEdges.length];
            return {
              x: (prev.toPt.x + edge.fromPt.x) / 2,
              y: (prev.toPt.y + edge.fromPt.y) / 2,
            };
          }));
        }
      }
    }

    const ppm2 = state.pixelsPerMeter * state.pixelsPerMeter;
    const out = [];
    for (const face of faces) {
      let a = 0, cx = 0, cy = 0;
      for (let i = 0; i < face.length; i++) {
        const p = face[i];
        const q = face[(i + 1) % face.length];
        const cross = p.x * q.y - q.x * p.y;
        a += cross;
        cx += (p.x + q.x) * cross;
        cy += (p.y + q.y) * cross;
      }
      a /= 2;
      // Positive = interior face in screen (Y-down) coords. Outer face has negative
      // signed area; tree-only / degenerate faces have ~0.
      if (a <= 1) continue;
      const f = 1 / (6 * a);
      out.push({ cx: cx * f, cy: cy * f, areaM2: a / ppm2 });
    }
    return out;
  }

  // Accepts "1.5", "1.5m", "150cm", "1500mm" (commas allowed). Unitless = meters,
  // matching the calibration prompt.
  function parseLengthInput(str) {
    if (str == null) return NaN;
    const s = String(str).trim().toLowerCase().replace(/,/g, '.');
    const m = s.match(/^([+-]?\d*\.?\d+)\s*(mm|cm|m)?$/);
    if (!m) return NaN;
    const v = parseFloat(m[1]);
    if (!isFinite(v)) return NaN;
    if (m[2] === 'mm') return v / 1000;
    if (m[2] === 'cm') return v / 100;
    return v;
  }

  // Resize a line from its midpoint to the requested real-world length, keeping
  // its direction. pixelsPerMeter (the scale) is untouched — this is deliberately
  // distinct from calibration. For the calibration line we also update its stored
  // realLength so the calibration stays internally consistent.
  function setLineLengthMeters(line, meters) {
    if (!state.pixelsPerMeter || !(meters > 0)) return;
    const dx = line.x2 - line.x1;
    const dy = line.y2 - line.y1;
    const L = Math.hypot(dx, dy);
    if (L < 0.5) return;
    const targetPx = meters * state.pixelsPerMeter;
    if (Math.abs(targetPx - L) < 0.001) return;
    const cx = (line.x1 + line.x2) / 2;
    const cy = (line.y1 + line.y2) / 2;
    const half = targetPx / 2;
    const ux = dx / L;
    const uy = dy / L;
    commit();
    line.x1 = cx - ux * half;
    line.y1 = cy - uy * half;
    line.x2 = cx + ux * half;
    line.y2 = cy + uy * half;
    if (line.id === state.calibrationLineId) line.realLength = meters;
    save();
    render();
  }

  function setCalibration(line, realLengthMeters) {
    const dx = line.x2 - line.x1;
    const dy = line.y2 - line.y1;
    const px = Math.sqrt(dx * dx + dy * dy);
    if (!px || !realLengthMeters) return;
    state.pixelsPerMeter = px / realLengthMeters;
    state.calibrationLineId = line.id;
    line.realLength = realLengthMeters;
  }

  function editCalibration(line) {
    showModal({
      title: 'Edit scale reference',
      message: 'Real-world length of the highlighted line, in meters.',
      defaultValue: line.realLength != null ? line.realLength : '',
      onOk: value => {
        if (!(value > 0)) return;
        commit();
        setCalibration(line, value);
        save();
        render();
      },
    });
  }

  function removeLine(id) {
    if (!state.lines.some(l => l.id === id)) return;
    commit();
    state.lines = state.lines.filter(l => l.id !== id);
    if (state.calibrationLineId === id) {
      state.calibrationLineId = null;
      state.pixelsPerMeter = null;
      // Losing the scale invalidates any in-flight shape placement.
      if (pendingShape) {
        pendingShape = null;
        updatePlacingCursor();
      }
    }
    if (selectedLineId === id) selectedLineId = null;
    save();
    render();
  }

  // ---------- shapes ----------
  // Dimensions live in real-world meters; only on render do they become pixels via
  // pixelsPerMeter. That way the same shape redraws correctly if calibration is later
  // adjusted, and matches what the user typed in the Add modal.
  function shapeAreaM2(s) {
    if (s.type === 'circle') return Math.PI * s.radiusM * s.radiusM;
    if (s.type === 'rect') return s.widthM * s.lengthM;
    return 0;
  }

  function addCircleAction() {
    if (!state.pixelsPerMeter) return;
    showFieldsModal({
      title: 'Add circle',
      message: 'Click on the floor plan to place the circle after entering its radius.',
      fields: [{ label: 'Radius (m)', placeholder: 'e.g. 0.5' }],
      onOk: ([r]) => {
        if (!(r > 0)) return;
        drawingLine = null;
        drawOpeningType = null;
        pendingShape = { type: 'circle', radiusM: r };
        updatePlacingCursor();
        render();
      },
    });
  }

  function addRectAction() {
    if (!state.pixelsPerMeter) return;
    showFieldsModal({
      title: 'Add rectangle',
      message: 'Click on the floor plan to place the rectangle after entering its dimensions.',
      fields: [
        { label: 'Width (m)', placeholder: 'e.g. 1.5' },
        { label: 'Length (m)', placeholder: 'e.g. 2.0' },
      ],
      onOk: ([w, l]) => {
        if (!(w > 0) || !(l > 0)) return;
        drawingLine = null;
        drawOpeningType = null;
        pendingShape = { type: 'rect', widthM: w, lengthM: l };
        updatePlacingCursor();
        render();
      },
    });
  }

  function editShape(shape) {
    if (shape.type === 'circle') {
      showFieldsModal({
        title: 'Edit circle',
        message: 'Radius in meters.',
        fields: [{ label: 'Radius (m)', defaultValue: shape.radiusM }],
        onOk: ([r]) => {
          if (!(r > 0)) return;
          commit();
          shape.radiusM = r;
          save();
          render();
        },
      });
    } else {
      showFieldsModal({
        title: 'Edit rectangle',
        message: 'Dimensions in meters; angle in degrees.',
        fields: [
          { label: 'Width (m)', defaultValue: shape.widthM },
          { label: 'Length (m)', defaultValue: shape.lengthM },
          { label: 'Angle (°)', defaultValue: shape.angle || 0 },
        ],
        onOk: ([w, l, a]) => {
          if (!(w > 0) || !(l > 0)) return;
          commit();
          shape.widthM = w;
          shape.lengthM = l;
          // Leave angle untouched if the user cleared the field.
          if (Number.isFinite(a)) shape.angle = a;
          save();
          render();
        },
      });
    }
  }

  function removeShape(id) {
    if (!state.shapes.some(s => s.id === id)) return;
    commit();
    state.shapes = state.shapes.filter(s => s.id !== id);
    if (selectedShapeId === id) selectedShapeId = null;
    save();
    render();
  }

  function setShapeName(shape, raw) {
    const trimmed = (raw || '').trim();
    const current = shape.name || '';
    if (trimmed === current) return;
    commit();
    if (trimmed) shape.name = trimmed;
    else delete shape.name;
    save();
    render();
  }

  function placePendingShape(screenX, screenY) {
    if (!pendingShape || !state.pixelsPerMeter) return;
    const pt = screenToWorld(screenX, screenY);
    commit();
    let shape;
    if (pendingShape.type === 'circle') {
      shape = {
        id: nextShapeId++, type: 'circle',
        cx: pt.x, cy: pt.y,
        radiusM: pendingShape.radiusM,
      };
    } else {
      shape = {
        id: nextShapeId++, type: 'rect',
        cx: pt.x, cy: pt.y,
        widthM: pendingShape.widthM, lengthM: pendingShape.lengthM,
        angle: 0,
      };
    }
    state.shapes.push(shape);
    selectedShapeId = shape.id;
    selectedLineId = null;
    pendingShape = null;
    updatePlacingCursor();
    save();
    render();
  }

  function cancelPendingShape() {
    if (!pendingShape) return;
    pendingShape = null;
    updatePlacingCursor();
    render();
  }

  function updatePlacingCursor() {
    container.classList.toggle('placing', !!pendingShape || !!drawOpeningType);
  }

  // ---------- openings (doors / windows) ----------
  // Click "Door"/"Window" to enter a click-click draw mode (same as drawing a line).
  // Openings need the scale set, matching the rest of the Add element menu.
  function startDrawOpening(type) {
    if (!state.pixelsPerMeter) return;
    pendingShape = null;
    drawingLine = null;
    drawOpeningType = type;
    selectedLineId = null;
    selectedShapeId = null;
    selectedOpeningId = null;
    updatePlacingCursor();
    render();
  }

  function cancelDrawOpening() {
    if (!drawOpeningType && !drawingLine) return;
    drawOpeningType = null;
    drawingLine = null;
    updatePlacingCursor();
    render();
  }

  function removeOpening(id) {
    if (!state.openings.some(o => o.id === id)) return;
    commit();
    state.openings = state.openings.filter(o => o.id !== id);
    if (selectedOpeningId === id) selectedOpeningId = null;
    save();
    render();
  }

  // Resize an opening from its midpoint to the requested real-world length, keeping its
  // direction — the same midpoint-anchored resize used for lines (sans calibration).
  function setOpeningLengthMeters(op, meters) {
    if (!state.pixelsPerMeter || !(meters > 0)) return;
    const dx = op.x2 - op.x1;
    const dy = op.y2 - op.y1;
    const L = Math.hypot(dx, dy);
    if (L < 0.5) return;
    const targetPx = meters * state.pixelsPerMeter;
    if (Math.abs(targetPx - L) < 0.001) return;
    const cx = (op.x1 + op.x2) / 2;
    const cy = (op.y1 + op.y2) / 2;
    const half = targetPx / 2;
    const ux = dx / L;
    const uy = dy / L;
    commit();
    op.x1 = cx - ux * half;
    op.y1 = cy - uy * half;
    op.x2 = cx + ux * half;
    op.y2 = cy + uy * half;
    save();
    render();
  }

  function updateAddShapeBtn() {
    const enabled = !!state.pixelsPerMeter;
    if (shapeMenuBtn) {
      shapeMenuBtn.disabled = !enabled;
      shapeMenuBtn.title = enabled
        ? 'Add an element (circle, rectangle, door or window)'
        : 'Add an element — draw a line first to set the scale.';
    }
    if (!enabled && shapeMenu && !shapeMenu.hidden) {
      shapeMenu.hidden = true;
      shapeMenuBtn.classList.remove('active');
    }
  }

  // ---------- hit-testing ----------
  const HANDLE_HIT_SCREEN = 10;
  const LINE_HIT_SCREEN = 6;
  const ROT_HANDLE_OFFSET = 22;
  const ROT_HANDLE_RADIUS = 6;
  const ROT_HANDLE_HIT_SCREEN = 12;

  function distToSegment(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const len2 = dx * dx + dy * dy;
    if (len2 === 0) return Math.hypot(px - ax, py - ay);
    let t = ((px - ax) * dx + (py - ay) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
  }

  // Hit-test shapes top-most first. Returns {shape, zone:'body'|'rotate'} or null.
  // 'rotate' is the screen-thin band along a rectangle's edges; circles only have 'body'.
  function hitTestShape(imgX, imgY) {
    if (!state.pixelsPerMeter) return null;
    const ppm = state.pixelsPerMeter;
    const edgeThreshBase = 12 / state.zoom;
    for (let i = state.shapes.length - 1; i >= 0; i--) {
      const s = state.shapes[i];
      if (s.type === 'circle') {
        const rPx = s.radiusM * ppm;
        if (Math.hypot(imgX - s.cx, imgY - s.cy) <= rPx) {
          return { shape: s, zone: 'body' };
        }
      } else if (s.type === 'rect') {
        const halfW = (s.widthM * ppm) / 2;
        const halfH = (s.lengthM * ppm) / 2;
        const α = (s.angle || 0) * Math.PI / 180;
        const cα = Math.cos(α), sα = Math.sin(α);
        const dx = imgX - s.cx, dy = imgY - s.cy;
        const lx = dx * cα + dy * sα;
        const ly = -dx * sα + dy * cα;
        // Dedicated rotation knob above the top edge — only when shape is selected.
        // Test before the body bounds so a click on the knob (outside the rect) still hits.
        if (s.id === selectedShapeId) {
          const offset = ROT_HANDLE_OFFSET / state.zoom;
          const hitR = ROT_HANDLE_HIT_SCREEN / state.zoom;
          if (Math.hypot(lx - 0, ly - (-halfH - offset)) <= hitR) {
            return { shape: s, zone: 'rotate' };
          }
        }
        if (Math.abs(lx) > halfW || Math.abs(ly) > halfH) continue;
        // Clamp the edge band so small rectangles still have a movable body zone;
        // otherwise the band swallows the whole interior and the shape can only be rotated.
        const edgeThresh = Math.min(edgeThreshBase, Math.min(halfW, halfH) / 2);
        const distToEdge = Math.min(halfW - Math.abs(lx), halfH - Math.abs(ly));
        return { shape: s, zone: distToEdge <= edgeThresh ? 'rotate' : 'body' };
      }
    }
    return null;
  }

  // Returns {line, endpoint} where endpoint is 1, 2, or 0 (whole line).
  function hitTest(imgX, imgY) {
    const handleR = HANDLE_HIT_SCREEN / state.zoom;
    // Endpoints get priority. Iterate top-most first.
    for (let i = state.lines.length - 1; i >= 0; i--) {
      const line = state.lines[i];
      if (Math.hypot(imgX - line.x1, imgY - line.y1) <= handleR) return { line, endpoint: 1 };
      if (Math.hypot(imgX - line.x2, imgY - line.y2) <= handleR) return { line, endpoint: 2 };
    }
    const lineR = LINE_HIT_SCREEN / state.zoom;
    for (let i = state.lines.length - 1; i >= 0; i--) {
      const line = state.lines[i];
      if (distToSegment(imgX, imgY, line.x1, line.y1, line.x2, line.y2) <= lineR) {
        return { line, endpoint: 0 };
      }
    }
    return null;
  }

  // Returns {opening, endpoint} where endpoint is 1, 2, or 0 (whole opening), or null.
  // Mirrors hitTest: endpoints take priority over the body.
  function hitTestOpening(imgX, imgY) {
    const handleR = HANDLE_HIT_SCREEN / state.zoom;
    for (let i = state.openings.length - 1; i >= 0; i--) {
      const op = state.openings[i];
      if (Math.hypot(imgX - op.x1, imgY - op.y1) <= handleR) return { opening: op, endpoint: 1 };
      if (Math.hypot(imgX - op.x2, imgY - op.y2) <= handleR) return { opening: op, endpoint: 2 };
    }
    const lineR = LINE_HIT_SCREEN / state.zoom;
    for (let i = state.openings.length - 1; i >= 0; i--) {
      const op = state.openings[i];
      if (distToSegment(imgX, imgY, op.x1, op.y1, op.x2, op.y2) <= lineR) {
        return { opening: op, endpoint: 0 };
      }
    }
    return null;
  }

  // Endpoints for a segment aligned to the screen's horizontal/vertical axis, length
  // preserved about its midpoint. image-space direction is derived from world rotation
  // so the result matches what the user sees. Returns null for a degenerate segment.
  function alignedEndpoints(seg, screenVertical) {
    const cx = (seg.x1 + seg.x2) / 2;
    const cy = (seg.y1 + seg.y2) / 2;
    const L = Math.hypot(seg.x2 - seg.x1, seg.y2 - seg.y1);
    if (L < 0.5) return null;
    const θ = -normRotation() * Math.PI / 180;
    const c = Math.cos(θ), s = Math.sin(θ);
    const sdx = screenVertical ? 0 : 1;
    const sdy = screenVertical ? 1 : 0;
    const idx = sdx * c - sdy * s;
    const idy = sdx * s + sdy * c;
    const hx = idx * L / 2;
    const hy = idy * L / 2;
    return { x1: cx - hx, y1: cy - hy, x2: cx + hx, y2: cy + hy };
  }

  function alignLineToScreenAxis(line, screenVertical) {
    const a = alignedEndpoints(line, screenVertical);
    if (!a) return;
    commit();
    line.x1 = a.x1; line.y1 = a.y1; line.x2 = a.x2; line.y2 = a.y2;
    recomputeCalibrationIfNeeded(line);
    save();
    render();
  }

  function alignOpeningToScreenAxis(op, screenVertical) {
    const a = alignedEndpoints(op, screenVertical);
    if (!a) return;
    commit();
    op.x1 = a.x1; op.y1 = a.y1; op.x2 = a.x2; op.y2 = a.y2;
    save();
    render();
  }

  // If the calibration line is reshaped, keep its declared real length and
  // update px/m. Translating the whole line leaves px/m unchanged.
  function recomputeCalibrationIfNeeded(line) {
    if (line.id !== state.calibrationLineId || !line.realLength) return;
    const px = Math.hypot(line.x2 - line.x1, line.y2 - line.y1);
    if (px > 0.5) state.pixelsPerMeter = px / line.realLength;
  }

  function updateHoverCursor() {
    if (pendingShape || drawOpeningType) {
      container.style.cursor = ''; // .placing class supplies crosshair
      return;
    }
    if (panModeToggle || drawingLine || !state.imageDataUrl || !mouseWorld) {
      container.style.cursor = '';
      return;
    }
    const openingHit = hitTestOpening(mouseWorld.x, mouseWorld.y);
    if (openingHit) {
      container.style.cursor = openingHit.endpoint === 0 ? 'move' : 'grab';
      return;
    }
    const lineHit = hitTest(mouseWorld.x, mouseWorld.y);
    if (lineHit) {
      container.style.cursor = lineHit.endpoint === 0 ? 'move' : 'grab';
      return;
    }
    const shapeHit = hitTestShape(mouseWorld.x, mouseWorld.y);
    if (shapeHit) {
      container.style.cursor = shapeHit.zone === 'rotate' ? 'crosshair' : 'move';
      return;
    }
    container.style.cursor = '';
  }

  // ---------- mouse interaction ----------
  container.addEventListener('contextmenu', e => e.preventDefault());

  container.addEventListener('mousedown', e => {
    if (!state.imageDataUrl) return;
    if (e.button !== 0 && e.button !== 1 && e.button !== 2) return;
    e.preventDefault();
    // Pending shape placement claims the left-click before pan-mode toggle, since
    // the placing cursor signals that the next click drops the shape. Middle/right
    // mouse still pans so the user can reposition without canceling placement.
    if (pendingShape && e.button === 0) {
      drag = { type: 'click-place-shape', x: e.clientX, y: e.clientY, moved: false };
      return;
    }

    const isPan = e.button === 1 || e.button === 2 || (e.button === 0 && (panModeToggle || e.shiftKey));

    if (isPan) {
      drag = {
        type: 'pan',
        x: e.clientX, y: e.clientY,
        startPanX: state.panX, startPanY: state.panY,
        moved: false,
      };
      container.classList.add('grabbing');
      return;
    }

    // While drawing a line or placing an opening, mousedown is just part of the click
    // that places the next point — don't grab existing elements (doors land on walls,
    // so a wall under the cursor must not steal the click).
    if (!drawingLine && !drawOpeningType) {
      const pt = screenToWorld(e.clientX, e.clientY);
      const openingHit = hitTestOpening(pt.x, pt.y);
      if (openingHit) {
        const op = openingHit.opening;
        drag = {
          type: openingHit.endpoint === 0 ? 'move-opening' : 'move-opening-handle',
          x: e.clientX, y: e.clientY,
          opening: op,
          endpoint: openingHit.endpoint,
          startImg: pt,
          orig: { x1: op.x1, y1: op.y1, x2: op.x2, y2: op.y2 },
          moved: false,
        };
        if (selectedOpeningId !== op.id) {
          selectedOpeningId = op.id;
          selectedLineId = null;
          selectedShapeId = null;
          render();
        }
        container.classList.add('grabbing');
        return;
      }
      const hit = hitTest(pt.x, pt.y);
      if (hit) {
        drag = {
          type: hit.endpoint === 0 ? 'move-line' : 'move-handle',
          x: e.clientX, y: e.clientY,
          line: hit.line,
          endpoint: hit.endpoint,
          startImg: pt,
          orig: { x1: hit.line.x1, y1: hit.line.y1, x2: hit.line.x2, y2: hit.line.y2 },
          moved: false,
        };
        if (selectedLineId !== hit.line.id) {
          selectedLineId = hit.line.id;
          selectedShapeId = null;
          selectedOpeningId = null;
          render();
        }
        container.classList.add('grabbing');
        return;
      }
      const shapeHit = hitTestShape(pt.x, pt.y);
      if (shapeHit) {
        const s = shapeHit.shape;
        drag = {
          type: shapeHit.zone === 'rotate' ? 'rotate-shape' : 'move-shape',
          x: e.clientX, y: e.clientY,
          shape: s,
          startImg: pt,
          orig: { cx: s.cx, cy: s.cy, angle: s.angle || 0 },
          startAngle: Math.atan2(pt.y - s.cy, pt.x - s.cx),
          moved: false,
        };
        if (selectedShapeId !== s.id) {
          selectedShapeId = s.id;
          selectedLineId = null;
          selectedOpeningId = null;
          render();
        }
        container.classList.add('grabbing');
        return;
      }
    }

    drag = { type: 'click', x: e.clientX, y: e.clientY, moved: false };
  });

  window.addEventListener('mousemove', e => {
    if (state.imageDataUrl) {
      mouseWorld = screenToWorld(e.clientX, e.clientY);
    }
    if (drag) {
      const sdx = e.clientX - drag.x;
      const sdy = e.clientY - drag.y;
      if (!drag.moved && (sdx * sdx + sdy * sdy) > 9) drag.moved = true;

      if (drag.type === 'pan') {
        state.panX = drag.startPanX + sdx;
        state.panY = drag.startPanY + sdy;
        applyTransform();
      } else if (drag.moved && (drag.type === 'move-handle' || drag.type === 'move-line')) {
        if (!drag.committed) {
          commit();
          drag.committed = true;
        }
        const ddx = mouseWorld.x - drag.startImg.x;
        const ddy = mouseWorld.y - drag.startImg.y;
        if (drag.type === 'move-handle') {
          if (drag.endpoint === 1) {
            drag.line.x1 = drag.orig.x1 + ddx;
            drag.line.y1 = drag.orig.y1 + ddy;
          } else {
            drag.line.x2 = drag.orig.x2 + ddx;
            drag.line.y2 = drag.orig.y2 + ddy;
          }
          recomputeCalibrationIfNeeded(drag.line);
        } else {
          drag.line.x1 = drag.orig.x1 + ddx;
          drag.line.y1 = drag.orig.y1 + ddy;
          drag.line.x2 = drag.orig.x2 + ddx;
          drag.line.y2 = drag.orig.y2 + ddy;
        }
        render();
      } else if (drag.moved && (drag.type === 'move-opening' || drag.type === 'move-opening-handle')) {
        if (!drag.committed) { commit(); drag.committed = true; }
        const ddx = mouseWorld.x - drag.startImg.x;
        const ddy = mouseWorld.y - drag.startImg.y;
        const op = drag.opening;
        if (drag.type === 'move-opening-handle') {
          if (drag.endpoint === 1) {
            op.x1 = drag.orig.x1 + ddx;
            op.y1 = drag.orig.y1 + ddy;
          } else {
            op.x2 = drag.orig.x2 + ddx;
            op.y2 = drag.orig.y2 + ddy;
          }
        } else {
          op.x1 = drag.orig.x1 + ddx;
          op.y1 = drag.orig.y1 + ddy;
          op.x2 = drag.orig.x2 + ddx;
          op.y2 = drag.orig.y2 + ddy;
        }
        render();
      } else if (drag.moved && drag.type === 'move-shape') {
        if (!drag.committed) { commit(); drag.committed = true; }
        const ddx = mouseWorld.x - drag.startImg.x;
        const ddy = mouseWorld.y - drag.startImg.y;
        drag.shape.cx = drag.orig.cx + ddx;
        drag.shape.cy = drag.orig.cy + ddy;
        render();
      } else if (drag.moved && drag.type === 'rotate-shape') {
        if (!drag.committed) { commit(); drag.committed = true; }
        const curAngle = Math.atan2(mouseWorld.y - drag.shape.cy, mouseWorld.x - drag.shape.cx);
        const deltaDeg = (curAngle - drag.startAngle) * 180 / Math.PI;
        drag.shape.angle = drag.orig.angle + deltaDeg;
        render();
      }
    } else {
      updateHoverCursor();
    }
    if (drawingLine || pendingShape) render();
  });

  window.addEventListener('mouseup', e => {
    if (!drag) return;
    const d = drag;
    drag = null;
    container.classList.remove('grabbing');

    if (d.type === 'pan') {
      if (d.moved) save();
      return;
    }
    if (d.type === 'move-handle' || d.type === 'move-line') {
      if (d.moved) { save(); render(); }
      updateHoverCursor();
      return;
    }
    if (d.type === 'move-shape' || d.type === 'rotate-shape') {
      if (d.moved) { save(); render(); }
      updateHoverCursor();
      return;
    }
    if (d.type === 'move-opening' || d.type === 'move-opening-handle') {
      if (d.moved) { save(); render(); }
      updateHoverCursor();
      return;
    }
    if (d.type === 'click-place-shape') {
      if (d.moved) return;
      if (!container.contains(e.target)) return;
      placePendingShape(e.clientX, e.clientY);
      return;
    }
    if (d.type === 'click') {
      if (d.moved) return;
      if (!container.contains(e.target)) return;
      handleDrawClick(e);
    }
  });

  function handleDrawClick(e) {
    if (!state.imageDataUrl) return;
    const pt = screenToWorld(e.clientX, e.clientY);
    if (!drawingLine) {
      drawingLine = { x1: pt.x, y1: pt.y };
      render();
      return;
    }
    if (Math.hypot(pt.x - drawingLine.x1, pt.y - drawingLine.y1) < 0.5) {
      drawingLine = null;
      render();
      return;
    }

    // Placing a door/window: same two-click gesture as a line, but it lands in
    // state.openings and reverts to normal drawing afterwards.
    if (drawOpeningType) {
      commit();
      const op = {
        id: nextOpeningId++,
        type: drawOpeningType,
        x1: drawingLine.x1, y1: drawingLine.y1,
        x2: pt.x, y2: pt.y,
      };
      state.openings.push(op);
      selectedOpeningId = op.id;
      selectedLineId = null;
